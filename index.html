/* ============================ DECISION CENTRE (your assistant) ============================ */
function mins(p){ return parseNumLoose(rawOf(p,KEYS.mins)); }
function advItem(name,meta,tag){ return `<div class="row" style="justify-content:space-between;cursor:pointer;padding:3px 0" onclick="openPlayer('${esc(name)}')"><span><b>${esc(name)}</b>${meta?' <span class="muted">'+meta+'</span>':''}</span>${tag||''}</div>`; }
function advCard(title,sub,html){ return html?`<div class="card" style="margin:0"><h3 style="margin:0 0 3px">${title}</h3><p class="sub" style="margin:0 0 8px">${sub}</p>${html}</div>`:''; }
function vAdvice(){
  const ps=players(), ya=STATE.settings.youthAge, keep=STATE.settings.youthKeep;
  const xi=bestXI(); const starters=new Set(Object.values(xi.assign).map(a=>a.p.name));
  const cards=[];

  // 0) Injured / unavailable — pick cover
  const injured=ps.filter(p=>!p.avail);
  cards.push(advCard("🤕 Out injured / unavailable","Already excluded from your XI — line up cover and don't rush their return.",
    injured.map(p=>advItem(p.name,(p.injury&&p.injury!=="-"?esc(p.injury):"ineligible")+(rawOf(p,KEYS.timeout)?" · out "+esc(rawOf(p,KEYS.timeout)):""),'<span class="tag bad">out</span>')).join("")));

  // 0b) Suspension watch — players on a lot of yellows
  const susp=ps.map(p=>({p,y:parseNumLoose(rawOf(p,KEYS.yel))})).filter(o=>o.y!=null&&o.y>=5).sort((a,b)=>b.y-a.y);
  cards.push(advCard("🟨 Suspension watch","On a stack of yellows — one more booking can mean a ban (the exact threshold depends on the competition). Maybe rest them in a cup tie.",
    susp.slice(0,8).map(o=>advItem(o.p.name,o.y+" yellows",`<span class="tag ${o.y>=8?'bad':'warn'}">${o.y>=8?'high risk':'careful'}</span>`)).join("")));

  // 1) Rest tired starters
  const tired=ps.filter(p=>starters.has(p.name)&&((condRank(rawOf(p,KEYS.con))||5)<=3||/high/i.test(rawOf(p,KEYS.fatigue)||"")));
  cards.push(advCard("🛌 Rest these starters","Tired or fatigued — start a deputy or they fade & risk injury.",
    tired.map(p=>advItem(p.name,esc(rawOf(p,KEYS.con)||""),'<span class="tag warn">rest</span>')).join("")));

  // 2) Give game time — good prospects starved of minutes ("should play more")
  const giveTime=ps.filter(p=>p.age<=ya&&!starters.has(p.name)).map(p=>({p,dev:devProxy(p,bestRole(p).score),m:mins(p)})).filter(o=>o.dev>=keep&&(!o.m||o.m<450)).sort((a,b)=>b.dev-a.dev).slice(0,6);
  cards.push(advCard("⏱️ Give them game time","High-potential youngsters not playing enough — start them in cups/easy games or loan out. (This is what makes them grow.)",
    giveTime.map(o=>advItem(o.p.name,o.p.age+"y · pot "+o.dev.toFixed(1)+(o.m?" · "+o.m+" mins":" · no mins"),'<span class="tag info">play him</span>')).join("")));

  // 3) Promote to first team
  const promote=ps.filter(p=>!starters.has(p.name)).map(p=>({p,...bestRole(p)})).filter(o=>o.score>=12).sort((a,b)=>b.score-a.score).slice(0,5);
  cards.push(advCard("🚀 Promote to the XI","Good enough to start now but on the bench — raise their squad status & play them.",
    promote.map(o=>advItem(o.p.name,o.p.age+"y · "+o.role.split(" ")[0],scoreBadge(o.score))).join("")));

  // 4) In/out of form
  const ratList=ps.map(p=>({p,rat:parseNumLoose(rawOf(p,KEYS.rat)),m:mins(p)})).filter(o=>o.rat!=null&&o.m&&o.m>=270);
  const cold=ratList.filter(o=>starters.has(o.p.name)&&o.rat<6.7).sort((a,b)=>a.rat-b.rat).slice(0,5);
  const hot=ratList.filter(o=>!starters.has(o.p.name)&&o.rat>=7.1).sort((a,b)=>b.rat-a.rat).slice(0,5);
  cards.push(advCard("❄️ Out of form — rotate","Starters under 6.70 avg — give them a rest or a kick up the backside.",
    cold.map(o=>advItem(o.p.name,"avg "+o.rat.toFixed(2),'<span class="tag bad">drop?</span>')).join("")));
  cards.push(advCard("🔥 In form — reward them","Squad players flying (7.10+) — get them into the XI.",
    hot.map(o=>advItem(o.p.name,"avg "+o.rat.toFixed(2),'<span class="tag good">start</span>')).join("")));

  // 5) Injury management
  const inj=ps.filter(p=>/high/i.test(rawOf(p,KEYS.injsus)||"")).sort((a,b)=>(starters.has(b.name)?1:0)-(starters.has(a.name)?1:0)).slice(0,6);
  cards.push(advCard("🏥 Injury-prone — manage load","Lower their training intensity and rotate them to avoid long lay-offs.",
    inj.map(p=>advItem(p.name,esc(rawOf(p,KEYS.injsus)||""),starters.has(p.name)?'<span class="tag warn">XI</span>':'')).join("")));

  // 6) Training unhappiness
  const unhappy=ps.filter(p=>/unhappy/i.test(rawOf(p,KEYS.trainhappy)||""));
  cards.push(advCard("🏋️ Unhappy with training","Ease their workload or change their focus before morale drops.",
    unhappy.slice(0,8).map(p=>advItem(p.name,esc(rawOf(p,KEYS.trainhappy)||""),'<span class="tag warn">review</span>')).join("")));

  // 7) Mentoring
  const mentors=ps.filter(p=>p.age>=27&&persIsGood(rawOf(p,KEYS.pers))&&A(p,'Det')>=13);
  const needM=ps.filter(p=>p.age<=ya&&(persIsBad(rawOf(p,KEYS.pers))||A(p,'Det')<10));
  if(mentors.length&&needM.length) cards.push(advCard("🤝 Set up a mentoring group",
    `Tutor: ${mentors.slice(0,3).map(m=>esc(last(m.name))).join(", ")}`,
    needM.slice(0,6).map(p=>advItem(p.name,(rawOf(p,KEYS.pers)||"")+ " · Det "+A(p,'Det'),'<span class="tag bad">mentor</span>')).join("")));

  // 8) Captain + set-piece reminders (one-off assignments)
  const cap=pickTop(p=>A(p,'Ldr')*0.45+A(p,'Det')*0.25+A(p,'Cmp')*0.15+A(p,'Tea')*0.15,2);
  const pen=pickTop(p=>A(p,'Pen')*0.45+A(p,'Cmp')*0.25+A(p,'Tec')*0.15+A(p,'Fin')*0.15,1);
  const cor=pickTop(p=>A(p,'Cor')*0.6+A(p,'Tec')*0.4,1);
  const oneoff=`${advItem(cap[0].p.name,"captain",'©️')}${cap[1]?advItem(cap[1].p.name,"vice-captain",'Ⓥ'):''}${advItem(pen[0].p.name,"penalties",'⚽')}${advItem(cor[0].p.name,"corners & free kicks",'🚩')}`;
  cards.push(advCard("📌 Assign these jobs once","Set them in your tactic / set pieces and forget — easy marginal gains.",oneoff));

  // 9) Weak position (no transfers => promote/loan back)
  const weak=DEPTH_GROUPS.map(g=>{const good=ps.filter(p=>eligible(p,g.slot)&&scoreFor(p,g.role)>=11).length;return{g,good};}).filter(o=>o.good<2);
  if(weak.length) cards.push(advCard("🛡️ Thin positions","No transfers in a youth challenge — so fast-track a youngster here, recall a loanee, or retrain a player.",
    weak.map(o=>`<div class="row" style="justify-content:space-between"><span><b>${o.g.label}</b></span><span class="tag ${o.good?'warn':'bad'}">${o.good} good</span></div>`).join("")));

  const count=injured.length+tired.length+giveTime.length+promote.length+cold.length+hot.length+inj.length+unhappy.length+(weak.length);
  // This week's top 3 — the highest-impact survival actions
  const top3=[];
  if(injured.length) top3.push(`🤕 <b>Cover ${injured.length} injury(ies)</b> — line up deputies for ${injured.slice(0,3).map(p=>esc(last(p.name))).join(", ")}.`);
  if(tired.length) top3.push(`🛌 <b>Rest ${tired.length} tired starter(s)</b> before kickoff — ${tired.slice(0,3).map(p=>esc(last(p.name))).join(", ")}.`);
  if(cold.length) top3.push(`❄️ <b>Drop/rotate ${esc(last(cold[0].p.name))}</b> (out of form) — try ${hot.length?esc(last(hot[0].p.name)):"a fresh option"}.`);
  if(top3.length<3 && giveTime.length) top3.push(`⏱️ <b>Get ${esc(last(giveTime[0].p.name))} minutes</b> (cup start or loan).`);
  if(top3.length<3) top3.push(`🪂 <b>Set the deep-block survival tactic</b> & opposition instructions before your next game.`);
  return `<div class="card" style="background:linear-gradient(135deg,#0c2b20,#121821)">
    <h2>🧭 Decision Centre</h2>
    <p class="sub">Your weekly checklist so you never miss a call. Built live from availability, fitness, form, development & morale. Tap any name to open the player.</p>
    <div class="grid kpis"><div class="kpi"><span class="ic">✅</span><div class="n">${count}</div><div class="l">Actions flagged</div></div>
      <div class="kpi"><span class="ic">🤕</span><div class="n">${injured.length}</div><div class="l">Out injured</div></div>
      <div class="kpi"><span class="ic">🛌</span><div class="n">${tired.length}</div><div class="l">To rest</div></div>
      <div class="kpi"><span class="ic">⏱️</span><div class="n">${giveTime.length}</div><div class="l">Need minutes</div></div></div>
    <div class="tipbox" style="margin-top:12px"><b>⭐ This week's top 3:</b><ol style="margin:6px 0 0;padding-left:20px">${top3.slice(0,3).map(t=>`<li>${t}</li>`).join("")}</ol></div>
  </div>
  <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(290px,1fr))">${cards.filter(Boolean).join("")}</div>
  <div class="card"><details><summary>📖 How to read your stats → what to do (cheat-sheet)</summary>
    <div class="tablewrap" style="margin-top:10px"><table><thead><tr><th>You see…</th><th>It means / do this</th></tr></thead><tbody>
      <tr><td>Avg rating <b>&lt; 6.7</b> over 5+ games</td><td>Out of form — rest him, drop him, or change his role/duty.</td></tr>
      <tr><td>High <b>xG</b> but few <b>goals</b></td><td>Getting chances, not finishing — train Finishing/Composure (or keep faith, it'll come).</td></tr>
      <tr><td>High <b>xA</b> but few <b>assists</b></td><td>Creating but team-mates miss — he's playing well, keep him.</td></tr>
      <tr><td><b>Condition</b> below "Good"</td><td>Rest him — tired players underperform and get injured.</td></tr>
      <tr><td><b>Injury Susceptibility</b> High/Very High</td><td>Lower training intensity, rotate, don't overplay.</td></tr>
      <tr><td>Young + few <b>minutes</b> + good potential</td><td>He needs games — start in cups or <b>loan out</b> for regular football.</td></tr>
      <tr><td><b>Tck R%</b> low for a defender</td><td>Defensive Positioning / Tackling training focus.</td></tr>
      <tr><td>Bad <b>Personality</b> (e.g. Mercenary)</td><td>Mentor him with a senior pro before he poisons the youngsters.</td></tr>
      <tr><td>"<b>Unhappy with training</b>"</td><td>Reduce workload or change his focus — protects morale.</td></tr>
    </tbody></table></div>
  </details></div>`;
}

/* ============================ IMPORT / FM CONNECT ============================ */
function parseFMHtml(text){
  const recs=[];
  try{const doc=new DOMParser().parseFromString(text,"text/html");const table=doc.querySelector("table");if(table){const ths=[...table.querySelectorAll("th")].map(t=>t.textContent.trim());[...table.querySelectorAll("tr")].forEach(tr=>{const tds=[...tr.querySelectorAll("td")];if(!tds.length)return;const rec={};tds.forEach((td,i)=>{if(ths[i]!==undefined)rec[ths[i]]=td.textContent.trim();});if(Object.keys(rec).length)recs.push(rec);});}}catch(e){}
  return recs;
}
function applyImport(text,label){
  const recs=parseFMHtml(text);
  if(recs.length<1){toast("Couldn't find a player table");return false;}
  STATE.current={label:label||("Update "+todayStr()),date:todayStr(),records:recs};save();
  toast("Loaded "+recs.length+" players");return true;
}
function openImport(){
  document.getElementById("modal").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <span class="x" onclick="closeModal()">✕</span><h2 style="margin:0 0 4px">📥 Import FM export</h2>
    <p class="sub">Drop or paste your <code>Untitled.html</code>. Includes Name, Age, Position, attributes & your role column.</p>
    <div id="drop" class="drop">📂 <b>Drop Untitled.html here</b><br><span class="muted">or click to choose</span></div>
    <input type="file" id="impFile" accept=".html,.htm,.txt" class="hidden">
    <textarea id="impText" placeholder="…or paste the HTML / table text" style="margin-top:10px"></textarea>
    <div class="row" style="margin-top:10px"><input type="text" id="impLabel" placeholder="Label (e.g. Jan 2027)" value="Update ${todayStr()}"><button class="btn primary" onclick="doImport()">Load</button>
    ${window.showOpenFilePicker?`<button class="btn gold" onclick="connectFM()">🔗 Connect for 1-click refresh</button>`:''}</div>
  </div></div>`;
  const drop=document.getElementById("drop"),file=document.getElementById("impFile");
  drop.onclick=()=>file.click();
  file.onchange=e=>{const f=e.target.files[0];if(f)f.text().then(t=>{document.getElementById("impText").value=t;toast("File read — click Load");});};
  ["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("hot");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("hot");}));
  drop.addEventListener("drop",e=>{const f=e.dataTransfer.files[0];if(f)f.text().then(t=>{document.getElementById("impText").value=t;toast("File read — click Load");});});
}
function doImport(){const t=document.getElementById("impText").value.trim();const l=document.getElementById("impLabel").value.trim();if(!t){toast("Paste or drop first");return;}if(applyImport(t,l)){closeModal();go("dash");}}
function saveSnapshot(){if(!STATE.current)return;STATE.snapshots.push(JSON.parse(JSON.stringify({label:STATE.current.label,date:STATE.current.date,records:STATE.current.records})));save();toast("Snapshot saved ("+STATE.snapshots.length+")");render();}

/* File System Access API — connect once, refresh in 1 click */
function idb(cb){const o=indexedDB.open("fmtm_fs",1);o.onupgradeneeded=()=>o.result.createObjectStore("kv");o.onsuccess=()=>cb(o.result);o.onerror=()=>cb(null);}
function idbSet(k,v){return new Promise(r=>idb(db=>{if(!db)return r(false);const t=db.transaction("kv","readwrite");t.objectStore("kv").put(v,k);t.oncomplete=()=>r(true);t.onerror=()=>r(false);}));}
function idbGet(k){return new Promise(r=>idb(db=>{if(!db)return r(null);const req=db.transaction("kv").objectStore("kv").get(k);req.onsuccess=()=>r(req.result);req.onerror=()=>r(null);}));}
async function connectFM(){
  if(!window.showOpenFilePicker){toast("Your browser can't auto-connect — use Import");openImport();return;}
  try{
    const [h]=await window.showOpenFilePicker({types:[{description:"FM export",accept:{"text/html":[".html",".htm"]}}]});
    await idbSet("fmHandle",h); STATE.fmConnected=true; save();
    const f=await h.getFile(); if(applyImport(await f.text(),"Update "+todayStr())){closeModal();toast("Connected ✓ — now 1-click refresh");go("dash");}
  }catch(e){ if(e.name!=="AbortError") toast("Connect cancelled"); }
}
async function refreshFM(){
  const h=await idbGet("fmHandle"); if(!h){connectFM();return;}
  try{
    if(h.queryPermission){const p=await h.queryPermission({mode:"read"});if(p!=="granted"){const r=await h.requestPermission({mode:"read"});if(r!=="granted"){toast("Permission needed");return;}}}
    const f=await h.getFile(); if(applyImport(await f.text(),"Update "+todayStr())) go("dash");
  }catch(e){ toast("Couldn't read file — reconnect"); STATE.fmConnected=false; save(); connectFM(); }
}
function refreshOrConnect(){ STATE.fmConnected?refreshFM():connectFM(); }

/* ============================ BACKUP / RESTORE ============================ */
function openSearch(){
  document.getElementById("modal").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:520px">
    <span class="x" onclick="closeModal()">✕</span><h2 style="margin:0 0 8px">🔍 Find a player</h2>
    <input type="text" id="gs" placeholder="Type a name…" autocomplete="off" style="width:100%;font-size:15px;padding:11px">
    <div id="gsRes" style="margin-top:10px;max-height:55vh;overflow:auto"></div>
  </div></div>`;
  const inp=document.getElementById("gs"), res=document.getElementById("gsRes");
  const draw=()=>{ const q=inp.value.toLowerCase().trim();
    let list=players().map(p=>{const r=assignedRole(p);return{p,role:r,score:scoreFor(p,r)};});
    if(q) list=list.filter(o=>o.p.name.toLowerCase().includes(q));
    list.sort((a,b)=>b.score-a.score); list=list.slice(0,40);
    res.innerHTML=list.map(o=>`<div class="row" style="justify-content:space-between;cursor:pointer;padding:8px 4px;border-bottom:1px solid var(--line)" onclick="closeModal();openPlayer('${esc(o.p.name)}')"><span><b>${esc(o.p.name)}</b> <span class="muted">${o.p.age}y · ${esc(o.p.position)}</span></span>${scoreBadge(o.score)}</div>`).join("")||'<p class="muted">No match.</p>'; };
  inp.oninput=draw; draw(); setTimeout(()=>inp.focus(),60);
}
function backup(){const blob=new Blob([JSON.stringify(STATE)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="gaffer-backup-"+todayStr()+".json";a.click();toast("Backup downloaded");}
function printReport(){
  const xi=bestXI(); const v=Object.values(xi.assign).map(a=>a.score); const avg=v.length?v.reduce((x,y)=>x+y,0)/v.length:0;
  const wk=players().filter(p=>p.age<=STATE.settings.youthAge).map(p=>{const br=bestRole(p);return{p,role:br.role,score:br.score,dev:devProxy(p,br.score)};}).sort((a,b)=>b.dev-a.dev).slice(0,8);
  const dec=releaseList().slice(0,6);
  const xiRows=FORMATION.map(s=>{const a=xi.assign[s.id];return `<tr><td>${s.label}</td><td>${a?esc(a.p.name):'—'}</td><td>${a?a.score.toFixed(1):''}</td></tr>`;}).join("");
  const wkRows=wk.map(o=>`<tr><td>${esc(o.p.name)}</td><td>${o.p.age}</td><td>${o.role}</td><td>${o.score.toFixed(1)}</td><td>${o.dev.toFixed(1)}</td></tr>`).join("");
  const html=`<html><head><title>Squad report</title><meta charset="utf-8"><style>body{font-family:Arial,Helvetica,sans-serif;padding:24px;color:#111}h1{margin:0;font-size:20px}h2{margin:18px 0 6px;border-bottom:2px solid #10b981;padding-bottom:3px;font-size:15px}table{border-collapse:collapse;width:100%;font-size:12px;margin-bottom:6px}td,th{border:1px solid #ccc;padding:5px 8px;text-align:left}th{background:#f0f0f0}</style></head><body>
    <h1>⚽ Squad report — Highway Star 4-2-3-1</h1>
    <p>${esc(STATE.current.label)} · ${STATE.current.date} · ${players().length} players · Best XI rating <b>${avg.toFixed(2)}</b></p>
    <h2>Best XI</h2><table><tr><th>Slot</th><th>Player</th><th>Fit</th></tr>${xiRows}</table>
    <h2>Top wonderkids (potential)</h2><table><tr><th>Name</th><th>Age</th><th>Role</th><th>Now</th><th>Potential</th></tr>${wkRows}</table>
    ${dec.length?`<h2>Surplus / review</h2><table><tr><th>Name</th><th>Age</th><th>Fit</th></tr>${dec.map(o=>`<tr><td>${esc(o.p.name)}</td><td>${o.p.age}</td><td>${o.score.toFixed(1)}</td></tr>`).join("")}</table>`:''}
    <p style="margin-top:18px;color:#888;font-size:11px">Generated by Gaffer — FM Team Manager</p>
  </body></html>`;
  const w=window.open("","_blank"); if(!w){toast("Allow pop-ups to print/save");return;} w.document.write(html); w.document.close(); w.focus(); setTimeout(()=>{try{w.print();}catch(e){}},350);
}
document.getElementById("restoreFile").onchange=e=>{const f=e.target.files[0];if(!f)return;f.text().then(t=>{try{const s=JSON.parse(t);if(s.settings){STATE=s;save();toast("Restored");go("dash");}else toast("Not a valid backup");}catch(err){toast("Bad file");}});};

renderTabs(); applyTextScale(); go("dash");
/* ============================ SWIPE NAV (mobile) ============================ */
/* Flick left/right to move between the 8 sections — but NOT when the swipe
   starts on something that scrolls horizontally (tables, pitch, nav, inputs, modal). */
let _tsx=0,_tsy=0,_swIgnore=true;
const SW_IGNORE=".tablewrap, nav, .seg, .pitch, input, textarea, select, .overlay, .chartbar";
function swipeNav(dir){
  const g=groupOf(TAB); if(!g)return;
  const i=GROUPS.indexOf(g), ni=i+dir;
  if(ni<0||ni>=GROUPS.length)return;
  const ng=GROUPS[ni]; go(lastView[ng.id]||ng.views[0][0]); toast(ng.label);
}
document.addEventListener("touchstart",e=>{
  if(e.touches.length!==1){_swIgnore=true;return;}
  const t=e.touches[0]; _tsx=t.clientX; _tsy=t.clientY;
  _swIgnore = !!(e.target.closest&&e.target.closest(SW_IGNORE)) || !!document.querySelector(".overlay");
},{passive:true});
document.addEventListener("touchend",e=>{
  if(_swIgnore)return;
  const t=e.changedTouches[0], dx=t.clientX-_tsx, dy=t.clientY-_tsy;
  if(Math.abs(dx)>70 && Math.abs(dx)>Math.abs(dy)*1.8) swipeNav(dx<0?1:-1);
},{passive:true});

/* PWA — offline + installable */
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
