<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<title>Gaffer — FM Team Manager</title>
<style>
:root{
  --bg:#0a0e14; --bg2:#121821; --bg3:#1b2330; --bg4:#232e3d; --line:#28323f;
  --txt:#eaf0f6; --mut:#8a97a8; --brand:#10b981; --brand2:#059669; --accent:#38bdf8; --gold:#fbbf24;
  --gk:#fbbf24; --def:#38bdf8; --mid:#10b981; --att:#f43f5e;
  --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:8px}
a{color:var(--accent)}
header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#0c1f1a 0%,#0a0e14 60%);border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;gap:10px;padding:11px 16px;max-width:1180px;margin:0 auto;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:.2px}
.brand .badge{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 3px 10px #10b98155}
.brand small{color:var(--mut);font-weight:600;font-size:11px;display:block;line-height:1}
.spacer{flex:1}
.btn{background:var(--bg3);color:var(--txt);border:1px solid var(--line);padding:8px 13px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--brand);color:#fff}
.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));border-color:transparent;color:#04130d}
.btn.primary:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent}
.btn.sm{padding:5px 9px;font-size:12px}
.btn.gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#2a1c00;border-color:transparent}
nav.tabs{display:flex;gap:4px;overflow-x:auto;padding:4px 12px 8px;max-width:1180px;margin:0 auto}
nav.tabs button{white-space:nowrap;background:transparent;border:none;color:var(--mut);padding:8px 13px;border-radius:9px;cursor:pointer;font-weight:700;font-size:13px}
nav.tabs button.active{background:var(--bg3);color:#fff;box-shadow:inset 0 0 0 1px var(--line)}
nav.tabs button:hover{color:var(--txt)}
main{max-width:1180px;margin:0 auto;padding:18px 16px 90px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:16px}
.card h2{margin:0 0 4px;font-size:19px;letter-spacing:-.2px}
.card h3{margin:18px 0 9px;font-size:15px}
.sub{color:var(--mut);font-size:13px;margin:0 0 14px}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
.kpi{background:linear-gradient(160deg,var(--bg3),var(--bg2));border:1px solid var(--line);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.kpi .n{font-size:27px;font-weight:800;line-height:1}
.kpi .l{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin-top:4px}
.kpi .ic{position:absolute;right:10px;top:8px;font-size:22px;opacity:.25}
table{width:100%;border-collapse:collapse;font-size:13px}
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{position:sticky;top:0;background:var(--bg3);cursor:pointer;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;z-index:1}
th:hover{color:var(--txt)}
tbody tr{cursor:pointer}
tbody tr:hover{background:#19222e}
.score{font-weight:800;padding:3px 9px;border-radius:7px;color:#06140d;display:inline-block;min-width:46px;text-align:center;font-variant-numeric:tabular-nums}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid currentColor}
.pill.gk{color:var(--gk)}.pill.def{color:var(--def)}.pill.mid{color:var(--mid)}.pill.att{color:var(--att)}
select,input[type=number],input[type=text]{background:var(--bg3);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:13px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.muted{color:var(--mut)}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:7px;display:inline-block}
.tag.good{background:#0c2c1c;color:#34d399}.tag.warn{background:#332408;color:#fbbf24}
.tag.bad{background:#331317;color:#fb7185}.tag.info{background:#0c2638;color:#7dd3fc}
.pitchwrap{display:grid;grid-template-columns:1.25fr 1fr;gap:18px}
@media(max-width:840px){.pitchwrap{grid-template-columns:1fr}.pitch{max-width:430px;margin:0 auto}}
.pitch{position:relative;width:100%;aspect-ratio:68/96;background:linear-gradient(0deg,#15532f,#1a6638);border:2px solid #2e7d4e;border-radius:14px;overflow:hidden;box-shadow:inset 0 0 60px #0006}
.pitch::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,#ffffff05 0 9.9%,#ffffff00 9.9% 20%)}
.pline{position:absolute;border:2px solid #ffffff40}
.pl-center{left:6%;right:6%;top:50%;height:0}
.pl-circle{left:37%;width:26%;top:43%;aspect-ratio:1;border-radius:50%}
.pl-boxT{left:23%;width:54%;top:0;height:13%;border-top:none}
.pl-boxB{left:23%;width:54%;bottom:0;height:13%;border-bottom:none}
.slot{position:absolute;transform:translate(-50%,-50%);width:70px;text-align:center;cursor:pointer;z-index:2}
.slot .dot{width:48px;height:48px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#06140d;border:2px solid #0a0e14;box-shadow:0 3px 10px #0009}
.slot .nm{font-size:11px;margin-top:4px;font-weight:700;text-shadow:0 1px 4px #000;line-height:1.1;color:#fff}
.slot .ro{font-size:9px;color:#bfe6cf;text-shadow:0 1px 2px #000;font-weight:700}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--mut);margin-top:10px}
.dotleg{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:middle;margin-right:5px}
details{background:var(--bg3);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:10px}
summary{cursor:pointer;font-weight:700}
.def-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;font-size:12px}
.def-grid div{background:var(--bg2);padding:6px 9px;border-radius:7px;border:1px solid var(--line)}
.notice{font-size:13.5px;line-height:1.65}
.notice li{margin-bottom:5px}
.flex2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.flex2{grid-template-columns:1fr}}
.drop{border:2px dashed var(--line);border-radius:12px;padding:26px;text-align:center;color:var(--mut);cursor:pointer}
.drop.hot{border-color:var(--brand);color:var(--txt);background:#0c1f17}
textarea{width:100%;min-height:120px;background:var(--bg3);color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:10px;font-family:ui-monospace,monospace;font-size:12px}
.hidden{display:none!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--brand);padding:11px 18px;border-radius:11px;z-index:300;font-weight:700;box-shadow:0 8px 26px #000a}
.tipbox{background:#0c1f17;border:1px solid #16543a;border-radius:11px;padding:13px 15px;margin:11px 0}
.tipbox.amber{background:#291e07;border-color:#5a4313}
.tipbox b{color:var(--brand)}
.tipbox.amber b{color:var(--gold)}
.barmini{height:7px;background:var(--bg4);border-radius:5px;overflow:hidden;min-width:54px;flex:1}
.barmini i{display:block;height:100%;border-radius:5px}
hr{border:none;border-top:1px solid var(--line);margin:16px 0}
code{background:var(--bg3);padding:1px 5px;border-radius:5px;font-size:12px}
.overlay{position:fixed;inset:0;background:#000a;backdrop-filter:blur(3px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow:auto}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:16px;max-width:760px;width:100%;padding:20px;box-shadow:0 20px 60px #000b;margin:auto}
.modal .x{float:right;cursor:pointer;font-size:22px;color:var(--mut);line-height:1}
.attrrow{display:grid;grid-template-columns:34px 1fr 28px;gap:8px;align-items:center;margin:3px 0;font-size:12px}
.attrrow .an{color:var(--mut)}
.attrrow .av{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.attrcols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:680px){.attrcols{grid-template-columns:1fr}}
.rolefit{display:grid;grid-template-columns:120px 1fr 46px;gap:9px;align-items:center;margin:5px 0;font-size:12px}
.seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.seg button{background:var(--bg3);border:1px solid var(--line);color:var(--mut);padding:7px 13px;border-radius:9px;cursor:pointer;font-weight:700;font-size:13px}
.seg button.on{background:var(--bg4);color:#fff;border-color:var(--brand)}
.chartbar{display:flex;align-items:flex-end;gap:4px;height:90px;padding-top:6px}
.chartbar .cb{flex:1;background:linear-gradient(180deg,var(--brand),var(--brand2));border-radius:4px 4px 0 0;min-height:3px;position:relative}
.chartbar .cb span{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:10px;color:var(--mut)}
.depthcell{display:flex;align-items:center;gap:8px}
</style>
</head>

    <input type="file" id="restoreFile" accept="application/json" class="hidden">

  <nav class="tabs" id="tabs"></nav>
</header>
<main id="view"></main>
<div id="modal"></div>

/* ============================ ENGINE (your exact Excel model) ============================ */
function num(v){ const n=parseFloat(v); return isFinite(n)?n:0; }
function footScore(f){ const v=SCORING.footmap[(f||"").trim()]; return v===undefined?0:v; }
function normalize(rec){
  const g=k=>rec[k]!==undefined?rec[k]:"";
  const attrs={}; ATTRS.forEach(a=>attrs[a]=num(g(a)));
  const role=(g("Position/Role/Duty")||"").trim();
  return {name:(g("Name")||"").trim(),age:num(g("Age")),position:(g("Position")||"").trim(),lf:(g("Left Foot")||"").trim(),rf:(g("Right Foot")||"").trim(),role:ROLES.includes(role)?role:"",attrs};
}
function players(){ return (STATE.current?.records||[]).map(normalize).filter(p=>p.name); }
function scoreFor(p,role){ if(!SCORING.weights[role])return 0; let D=footScore(p.lf)+footScore(p.rf); const w=SCORING.weights[role]; for(const a of ATTRS) D+=(p.attrs[a]||0)*(w[a]||0); return Math.round(D/SCORING.rolemax[role]*20*100)/100; }
function bestRole(p){ let best=null,bs=-1; for(const r of ROLES){const s=scoreFor(p,r);if(s>bs){bs=s;best=r;}} return {role:best,score:bs}; }
function assignedRole(p){ if(STATE.overrides[p.name]&&ROLES.includes(STATE.overrides[p.name]))return STATE.overrides[p.name]; if(p.role)return p.role; return bestRole(p).role; }
function parsePos(str){ const map={}; (str||"").split(",").forEach(seg=>{seg=seg.trim();if(!seg)return;const m=seg.match(/^([A-Za-z\/]+)\s*(?:\(([^)]*)\))?/);if(!m)return;const toks=m[1].split("/");let sides=(m[2]||"").replace(/[^LRC]/g,"").split("");if(!sides.length)sides=["C"];toks.forEach(t=>{t=t.toUpperCase();map[t]=map[t]||new Set();sides.forEach(s=>map[t].add(s));});}); return map; }
function eligible(p,slot){ const mp=parsePos(p.position); for(const tok in slot.match){ if(mp[tok]) for(const s of slot.match[tok]) if(mp[tok].has(s)) return true; } return false; }
function bestXI(opts={}){
  const ps=players(), ya=STATE.settings.youthAge, pairs=[];
  FORMATION.forEach(slot=>ps.forEach(p=>{const s=scoreFor(p,slot.role);const nat=eligible(p,slot);let adj=s-(nat?0:4);if(opts.youthBoost&&p.age<=ya)adj+=opts.youthBoost;pairs.push({slot,p,score:s,nat,adj});}));
  pairs.sort((a,b)=>b.adj-a.adj);
  const usedP=new Set(),filled={},assign={};
  for(const pr of pairs){ if(filled[pr.slot.id]||usedP.has(pr.p.name))continue; filled[pr.slot.id]=true;usedP.add(pr.p.name);assign[pr.slot.id]={p:pr.p,score:pr.score,nat:pr.nat}; }
  const bench=ps.filter(p=>!usedP.has(p.name)).map(p=>({p,...bestRole(p)})).sort((a,b)=>b.score-a.score).slice(0,STATE.settings.benchSize);
  return {assign,bench,used:usedP};
}
function trainingFor(p){
  const role=assignedRole(p), w=SCORING.weights[role]||{};
  const items=ATTRS.filter(a=>(w[a]||0)>=0.4).map(a=>({a,w:w[a],v:p.attrs[a]||0,gap:(w[a]||0)*Math.max(0,15-(p.attrs[a]||0))}));
  items.sort((x,y)=>y.gap-x.gap);
  const weak=items.filter(i=>i.v<13).slice(0,4);
  const fc={}; weak.forEach(i=>{const f=ATTR_FOCUS[i.a]||"General";(fc[f]=fc[f]||[]).push(i.a);});
  const focuses=Object.entries(fc).sort((a,b)=>b[1].length-a[1].length);
  return {role,fmRole:ROLE_FM[role]||role,weak,focuses};
}

/* ============================ UI HELPERS ============================ */
function scoreColor(s){ if(s>=14)return"#22c55e"; if(s>=12)return"#4ade80"; if(s>=10)return"#a3e635"; if(s>=8)return"#fbbf24"; if(s>=6)return"#fb923c"; return"#f43f5e"; }
function scoreBadge(s){ return `<span class="score" style="background:${scoreColor(s)}">${(+s).toFixed(2)}</span>`; }
function grpOf(role){ if(role.startsWith("SK"))return"gk"; if(role.startsWith("FB")||role.startsWith("BPD"))return"def"; if(role.startsWith("DM")||role.startsWith("IF")||role.startsWith("AM -"))return"mid"; return"att"; }
function rolePill(role){ return `<span class="pill ${grpOf(role)}">${role}</span>`; }
function grpColor(g){ return g=="gk"?"var(--gk)":g=="def"?"var(--def)":g=="mid"?"var(--mid)":"var(--att)"; }
function attrColor(v){ if(v>=15)return"#22c55e"; if(v>=12)return"#a3e635"; if(v>=9)return"#fbbf24"; if(v>=6)return"#fb923c"; return"#f43f5e"; }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.remove("hidden"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.add("hidden"),2400); }
function esc(s){ return (s+"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function last(n){ return n.split(" ").slice(-1)[0]; }

/* ---------- SQUAD ---------- */
let squadSort={key:"score",dir:-1}, squadFilter={role:"",q:""};
function squadRows(){
  let rows=players().map(p=>{const r=assignedRole(p);return{p,role:r,score:scoreFor(p,r),best:bestRole(p)};});
  if(squadFilter.role)rows=rows.filter(r=>r.role===squadFilter.role);
  if(squadFilter.q){const q=squadFilter.q.toLowerCase();rows=rows.filter(r=>r.p.name.toLowerCase().includes(q));}
  const k=squadSort.key,d=squadSort.dir;
  rows.sort((a,b)=>{let va,vb;if(k==="name"){return a.p.name<b.p.name?-d:a.p.name>b.p.name?d:0;}if(k==="age"){va=a.p.age;vb=b.p.age;}else if(k==="role"){return a.role<b.role?-d:a.role>b.role?d:0;}else if(k==="pos"){return a.p.position<b.p.position?-d:a.p.position>b.p.position?d:0;}else{va=a.score;vb=b.score;}return(va-vb)*d;});
  return rows;
}
function vSquad(){
  const rows=squadRows();
  const opts=`<option value="">All roles</option>`+ROLES.map(r=>`<option ${squadFilter.role===r?'selected':''}>${r}</option>`).join("");
  return `<div class="card">
    <h2>👥 Squad — ${rows.length} players</h2>
    <p class="sub">Tap any player for full attributes, role fit & training. Score = fit in the assigned role.</p>
    <div class="row" style="margin-bottom:12px">
      <input type="text" id="sq" placeholder="🔍 Search name…" value="${esc(squadFilter.q)}">
      <select id="sr">${opts}</select>
    </div>
    <div class="tablewrap"><table>
      <thead><tr><th data-k="name">Name</th><th data-k="age">Age</th><th data-k="pos">Position</th><th data-k="role">Role</th><th data-k="score">Score</th><th>Best</th></tr></thead>
      <tbody>${rows.map(r=>`<tr onclick="openPlayer('${esc(r.p.name)}')">
        <td><b>${esc(r.p.name)}</b></td><td>${r.p.age||""}</td><td class="muted">${esc(r.p.position)}</td>
        <td>${rolePill(r.role)}</td><td>${scoreBadge(r.score)}</td>
        <td>${r.best.role!==r.role?`<span class="muted">${r.best.role.split(" ")[0]} ${r.best.score.toFixed(1)}</span>`:'<span class="tag good">best fit</span>'}</td>
      </tr>`).join("")}</tbody>
    </table></div>
  </div>`;
}
function wireSquad(){
  document.querySelectorAll("#view th[data-k]").forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(squadSort.key===k)squadSort.dir*=-1;else{squadSort.key=k;squadSort.dir=(k==="name"||k==="role"||k==="pos")?1:-1;}render();});
  const sq=document.getElementById("sq"),sr=document.getElementById("sr");
  sq.oninput=()=>{squadFilter.q=sq.value;const pos=sq.selectionStart;render();const el=document.getElementById("sq");el.focus();el.setSelectionRange(pos,pos);};
  sr.onchange=()=>{squadFilter.role=sr.value;render();};
}

function openPlayer(name){

  const role=assignedRole(p), tr=trainingFor(p);

  const attrCol=g=>`<div><div class="muted" style="font-weight:700;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px">${g}</div>${ATTR_GROUPS[g].map(a=>{const v=p.attrs[a]||0;return `<div class="attrrow" title="${ATTR_FULL[a]}"><span class="an">${a}</span><span class="barmini"><i style="width:${v/20*100}%;background:${attrColor(v)}"></i></span><span class="av" style="color:${attrColor(v)}">${v}</span></div>`;}).join("")}</div>`;
  const baseSnap=STATE.snapshots.length?STATE.snapshots[STATE.snapshots.length-1]:null;
  let progHtml="";
  if(baseSnap){ const b=baseSnap.records.map(normalize).find(x=>x.name===name); if(b){ const dS=Math.round((scoreFor(p,role)-scoreFor(b,role))*100)/100; const ups=ATTRS.filter(a=>(SCORING.weights[role][a]||0)>0&&(p.attrs[a]||0)>(b.attrs[a]||0)).map(a=>`${a}+${(p.attrs[a]||0)-(b.attrs[a]||0)}`); progHtml=`<div class="tipbox"><b>Since "${esc(baseSnap.label)}":</b> score ${dS>=0?'+':''}${dS.toFixed(2)} ${ups.length?'· '+esc(ups.slice(0,10).join(", ")):'· no key gains'}</div>`; } }
  document.getElementById("modal").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <span class="x" onclick="closeModal()">✕</span>
    <h2 style="margin:0">${esc(p.name)}</h2>
    <p class="sub">${p.age} y · ${esc(p.position)} · L:${esc(p.lf)||"–"} R:${esc(p.rf)||"–"} &nbsp; ${rolePill(role)} ${scoreBadge(scoreFor(p,role))}</p>
    <div class="row" style="margin-bottom:12px">
      <label class="muted">Assigned role:
        <select onchange="setRole('${esc(p.name)}',this.value)">
          <option value="">(auto best)</option>${ROLES.map(r=>`<option ${role===r?'selected':''}>${r}</option>`).join("")}
        </select></label>
    </div>
    ${progHtml}
    <h3>🎯 Recommended training</h3>
    <div class="tipbox">
      <b>Individual role training:</b> ${esc(tr.fmRole)}<br>
      ${tr.focuses.length?`<b>Additional focus:</b> ${tr.focuses.map(f=>`${esc(f[0])} <span class="muted">(${f[1].join(", ")})</span>`).join(" · ")}`:`<b>Already strong</b> for this role — keep general role training.`}
    </div>
    <h3>📐 Role fit (all 7 roles)</h3>

/* ---------- YOUTH ---------- */
function vYouth(){
  const ya=STATE.settings.youthAge,keep=STATE.settings.youthKeep;
  const ps=players().filter(p=>p.age<=ya).map(p=>({p,...bestRole(p)})).sort((a,b)=>b.score-a.score);
  const rows=ps.map(o=>{let tag,txt;if(o.score>=keep+2){tag="good";txt="First-team ready";}else if(o.score>=keep){tag="info";txt="Promising — develop";}else if(o.score>=keep-3){tag="warn";txt="Project / loan";}else{tag="bad";txt="Low ceiling so far";}return `<tr onclick="openPlayer('${esc(o.p.name)}')"><td><b>${esc(o.p.name)}</b></td><td>${o.p.age}</td><td class="muted">${esc(o.p.position)}</td><td>${rolePill(o.role)}</td><td>${scoreBadge(o.score)}</td><td><span class="tag ${tag}">${txt}</span></td></tr>`;}).join("");

    <div class="tablewrap"><table><thead><tr><th>Name</th><th>Age</th><th>Position</th><th>Best role</th><th>Score</th><th>Verdict</th></tr></thead><tbody>${rows||'<tr><td colspan=6 class="muted">No players ≤'+ya+'.</td></tr>'}</tbody></table></div>

}

/* ---------- RELEASE ---------- */
function releaseList(){
  const rs=STATE.settings.releaseScore;
  return players().map(p=>({p,...bestRole(p)})).map(o=>{let reason=null,tag="warn";if(o.score<rs&&o.p.age>=24){reason="Below "+rs+" fit and 24+ — won't improve enough.";tag="bad";}else if(o.score<rs-2){reason="Very low fit ("+o.score.toFixed(1)+") in his best role.";tag="bad";}else if(o.p.age>=32&&o.score<rs+2){reason="Ageing ("+o.p.age+") and only squad-level.";tag="warn";}return reason?{...o,reason,tag}:null;}).filter(Boolean).sort((a,b)=>a.score-b.score);
}
function vRelease(){
  const list=releaseList();
  const rows=list.map(o=>`<tr onclick="openPlayer('${esc(o.p.name)}')"><td><b>${esc(o.p.name)}</b></td><td>${o.p.age}</td><td class="muted">${esc(o.p.position)}</td><td>${rolePill(o.role)}</td><td>${scoreBadge(o.score)}</td><td><span class="tag ${o.tag}">${esc(o.reason)}</span></td></tr>`).join("");

}

/* ---------- DEPTH ---------- */
function vDepth(){
  const ps=players();
  const blocks=DEPTH_GROUPS.map(g=>{
    const cand=ps.filter(p=>eligible(p,g.slot)).map(p=>({p,s:scoreFor(p,g.role)})).sort((a,b)=>b.s-a.s);
    const good=cand.filter(c=>c.s>=11).length;
    const status=good>=2?["good","Solid"]:good==1?["warn","Thin — 1 deep"]:["bad","WEAK — buy/promote"];
    const list=cand.slice(0,6).map(c=>`<div class="depthcell" onclick="openPlayer('${esc(c.p.name)}')" style="cursor:pointer;margin:3px 0"><span style="min-width:120px"><b>${esc(last(c.p.name))}</b> <span class="muted">${c.p.age}</span></span><span class="barmini"><i style="width:${c.s/20*100}%;background:${scoreColor(c.s)}"></i></span><span style="font-weight:700;color:${scoreColor(c.s)};min-width:34px;text-align:right">${c.s.toFixed(1)}</span></div>`).join("")||'<span class="muted">No natural option.</span>';
    return `<div class="card" style="margin-bottom:0"><div class="row" style="justify-content:space-between"><h3 style="margin:0">${g.label}</h3><span class="tag ${status[0]}">${status[1]}</span></div><p class="sub" style="margin:6px 0 8px">${rolePill(g.role)} · ${cand.length} natural · ${good} good (≥11)</p>${list}</div>`;
  }).join("");

}

/* ---------- PROGRESSION ---------- */
function vProgress(){

  const opts=STATE.snapshots.map((s,i)=>`<option value="${i}">${esc(s.label)} (${s.date})</option>`).join("");
  return `<div class="card"><h2>📈 Progression</h2><p class="sub">Attribute gains in <b>current data</b> vs an older snapshot, for the attributes that matter to each player's role.</p>
    <div class="row"><label>Baseline: <select id="baseSel" onchange="renderProg()">${opts}</select></label></div><div id="progOut" style="margin-top:12px"></div></div>`;

function renderProg(){
  const i=+document.getElementById("baseSel").value,base=STATE.snapshots[i];if(!base)return;
  const bm={};base.records.map(normalize).forEach(p=>bm[p.name]=p);
  const rows=players().map(p=>{const b=bm[p.name];if(!b)return null;const role=assignedRole(p),w=SCORING.weights[role]||{};let gain=0,ups=[];ATTRS.forEach(a=>{if((w[a]||0)>0){const d=(p.attrs[a]||0)-(b.attrs[a]||0);if(d!==0){gain+=d;if(d>0)ups.push(a+" +"+d);}}});const sN=scoreFor(p,role),sO=scoreFor(b,role);return{p,role,gain,sN,sO,ds:Math.round((sN-sO)*100)/100,ups};}).filter(Boolean).sort((a,b)=>b.gain-a.gain);
  document.getElementById("progOut").innerHTML=`<div class="tablewrap"><table><thead><tr><th>Name</th><th>Role</th><th>Then→Now</th><th>Δ</th><th>Pts</th><th>Improved</th></tr></thead><tbody>${rows.map(r=>`<tr onclick="openPlayer('${esc(r.p.name)}')"><td><b>${esc(r.p.name)}</b></td><td>${rolePill(r.role)}</td><td class="muted">${r.sO.toFixed(1)}→<b style="color:${scoreColor(r.sN)}">${r.sN.toFixed(1)}</b></td><td><span class="tag ${r.ds>0?'good':r.ds<0?'bad':'info'}">${r.ds>0?'+':''}${r.ds.toFixed(2)}</span></td><td><b style="color:${r.gain>0?'#34d399':r.gain<0?'#fb7185':'var(--mut)'}">${r.gain>0?'+':''}${r.gain}</b></td><td class="muted" style="white-space:normal">${esc(r.ups.slice(0,8).join(", "))}</td></tr>`).join("")}</tbody></table></div>`;
}

  <div class="tipbox amber"><b>Why not fully automatic?</b> Browsers can't silently read your disk (security). "Connect FM" lets you pick <code>Untitled.html</code> once; after that it's a single click to reload it. On mobile, use Backup/Restore.</div>
  <h3>The score (0–20)</h3>
  <p><code>Score = (feet + Σ attribute × role-weight) ÷ role-max × 20</code> — a <b>fit</b> rating for that role, not potential.</p>
  <div class="row" style="gap:10px;margin:8px 0">${[["Excellent",14.5],["Good/starter",12],["Rotation",10],["Weak",7],["Poor",4]].map(([t,s])=>`<span>${scoreBadge(s)} <b>${t}</b></span>`).join(" ")}</div>
  <h3>Tabs</h3>
  <div class="def-grid">
    <div><b>🏠 Dashboard</b> — squad health + what to do</div><div><b>👥 Squad</b> — all players, tap for detail</div>
    <div><b>⚽ Best XI</b> — strongest legal 4-2-3-1</div><div><b>🎯 Training</b> — individual training plan</div>
    <div><b>🌱 Youth</b> — who to develop</div><div><b>🗑️ Release</b> — who to sell</div>
    <div><b>📊 Depth</b> — weak positions to fix</div><div><b>📈 Progress</b> — gains vs a snapshot</div>
    <div><b>🏆 Tactics</b> — two ready setups</div><div><b>🗂️ More</b> — data, snapshots, settings</div>
  </div>
  <details style="margin-top:14px"><summary>Attribute glossary (47)</summary><div class="def-grid" style="margin-top:8px">${ATTRS.map(a=>`<div><b>${a}</b> — ${ATTR_FULL[a]||a}</div>`).join("")}</div></details>
  <div class="tipbox"><b>Privacy:</b> all data stays in this browser + your backup files. Nothing is uploaded.</div>
  </div>`;
}

/* ============================ SET PIECES & LEADERS ============================ */
function A(p,a){ return p.attrs[a]||0; }
function pickTop(fn,n){ return players().map(p=>({p,v:fn(p)})).sort((a,b)=>b.v-a.v).slice(0,n); }
function inXIset(){ return new Set(Object.values(bestXI().assign).map(a=>a.p.name)); }
function spTag(name,set){ return set.has(name)?'<span class="tag good" style="margin-left:6px">XI</span>':'<span class="tag warn" style="margin-left:6px">bench</span>'; }
function spTable(list,set,fmt){ return `<div class="tablewrap"><table><tbody>${list.map((o,i)=>`<tr onclick="openPlayer('${esc(o.p.name)}')"><td style="width:26px;color:var(--mut)">${i+1}</td><td><b>${esc(o.p.name)}</b>${spTag(o.p.name,set)}</td><td class="muted">${esc(o.p.position)}</td><td style="text-align:right">${fmt(o)}</td></tr>`).join("")}</tbody></table></div>`; }
function vSetpiece(){
  const set=inXIset();
  const pen=pickTop(p=>A(p,'Pen')*0.45+A(p,'Cmp')*0.25+A(p,'Tec')*0.15+A(p,'Fin')*0.15,5);
  const corner=pickTop(p=>A(p,'Cor')*0.6+A(p,'Tec')*0.25+A(p,'Vis')*0.15,3);
  const fk=pickTop(p=>A(p,'Fre')*0.6+A(p,'Tec')*0.25+A(p,'Cmp')*0.15,3);
  const lthrow=pickTop(p=>A(p,'L Th'),3).filter(o=>o.v>=10);
  const aerial=pickTop(p=>A(p,'Jum')*0.5+A(p,'Hea')*0.35+A(p,'Bra')*0.15,6);
  const captain=pickTop(p=>A(p,'Ldr')*0.45+A(p,'Det')*0.25+A(p,'Cmp')*0.15+A(p,'Tea')*0.15,4);
  const fast=pickTop(p=>A(p,'Pac')*0.6+A(p,'Acc')*0.4,3);
  const throwWeapon = lthrow.length && lthrow[0].v>=14;
  return `<div class="card">
    <h2>🎯 Set pieces & leaders</h2>
    <p class="sub">Auto-picked from your squad's attributes — set pieces are roughly <b>a third of all goals</b>, so getting these right wins games. <span class="tag good">XI</span> = currently a starter. Tap any name for detail.</p>
    <div class="flex2">
      <div><h3 style="margin-top:0">⚽ Penalty taker order</h3>${spTable(pen,set,o=>'<b>'+Math.round(o.v)+'</b>')}<p class="sub" style="margin-top:6px">Order = your shootout list too. Top man takes match penalties.</p></div>
      <div><h3 style="margin-top:0">🚩 Corners</h3>${spTable(corner,set,o=>'Cor '+A(o.p,'Cor'))}<h3>🎯 Direct free kicks</h3>${spTable(fk,set,o=>'Fre '+A(o.p,'Fre'))}</div>
    </div>
    <h3>🛬 Attacking set-piece targets (who to send into the box)</h3>
    ${spTable(aerial,set,o=>'Jump '+A(o.p,'Jum')+' · Head '+A(o.p,'Hea'))}
    <div class="tipbox"><b>Routine:</b> put your top 2 aerial men on <b>Attack near post</b> & <b>Attack far post</b>, the 3rd to <b>Lurk outside area</b> for the knock-down. Keep your fastest forward (${esc(last(fast[0].p.name))}) <b>Stay forward</b> to punish a turnover.</div>
    ${throwWeapon?`<div class="tipbox amber"><b>Long-throw weapon:</b> ${esc(lthrow[0].p.name)} has Long Throws ${lthrow[0].v} — set throw-ins near the box to <b>launch into the area</b> like an extra corner.</div>`:lthrow.length?`<p class="muted">Best long throw: ${esc(lthrow[0].p.name)} (${lthrow[0].v}) — usable but not a weapon.</p>`:''}
    <h3>©️ Captain candidates</h3>
    ${spTable(captain,set,o=>'Ldr '+A(o.p,'Ldr')+' · Det '+A(o.p,'Det'))}
    <div class="tipbox"><b>Pick:</b> make <b>${esc(captain[0].p.name)}</b> captain and <b>${esc(captain[1]?captain[1].p.name:'—')}</b> vice — leadership lifts the whole team's Determination on the pitch.</div>
    <h3>🛡️ Defending set pieces</h3>
    <div class="tipbox"><b>Man-mark their tall men</b> with your best aerial defenders (${aerial.filter(o=>/D /.test(o.p.position)).slice(0,2).map(o=>esc(last(o.p.name))).join(", ")||esc(last(aerial[0].p.name))}). Leave your fastest forward (${esc(last(fast[0].p.name))}) up the pitch to counter. Use <b>zonal + man-marking mix</b> if your defenders' Heading is below 12.</div>
  </div>`;
}

/* ============================ IN-MATCH ASSISTANT ============================ */
const MENT=['Very Defensive','Defensive','Cautious','Balanced','Positive','Attacking','Very Attacking'];
let MD={min:75, sit:'losing1', opp:'similar', men:'even'};
let oppArch="possession";
function setMD(k,v){ MD[k]=v; render(); }
function mdAdvice(){
  const {min,sit,opp,men}=MD;
  const late=min>=78, vl=min>=88;
  let idx;
  if(sit==='losingBig') idx = late?6:5;
  else if(sit==='losing1') idx = vl?6:late?5:(min>=30?4:4);
  else if(sit==='drawing') idx = late?4:3;
  else if(sit==='winning1') idx = late?2:3;
  else if(sit==='winningBig') idx = late?1:2;
  else idx=3;
  // opponent strength
  if(opp==='weaker') idx+=1;
  if(opp==='stronger') idx-=1;
  // man advantage
  if(men==='up') idx+=1;
  if(men==='down') idx-=2;
  // floors/ceilings: if losing and late, never go below Positive
  if((sit==='losing1'||sit==='losingBig') && late) idx=Math.max(idx,5);
  if((sit==='winning1'||sit==='winningBig') && late) idx=Math.min(idx,3);
  idx=Math.max(0,Math.min(6,idx));
  const m=MENT[idx];
  let poss,def,subs,note;
  if(idx>=5){ poss="Higher tempo · more risky/direct passes · full-backs & wingers join attacks · pack the box · 'Be more expressive'"; def="Higher line + higher press to win it back fast (watch the counter)"; subs="Throw on a fresh striker/winger for a defensive mid — go 4-2-4 / 4-3-3 shape"; }
  else if(idx===4){ poss="Keep tempo up · work ball into box · run at them"; def="Standard press, stay compact"; subs="Like-for-like fresh legs up front"; }
  else if(idx===3){ poss="Play the percentages, hold your shape, don't force it"; def="Standard block"; subs="Only if someone's tiring or carded"; }
  else { poss="Lower tempo · retain possession · take it to the corner flags · fewer men forward · waste time"; def="Drop deeper (mid/low block) · don't dive into tackles · mark tight in the box"; subs="Fresh legs in midfield + an extra defensive mid or centre-back to see it out"; }
  // situational note
  if(sit==='losingBig') note = late?"Kitchen-sink time — but keep ONE quick man back so a 3rd goal doesn't kill morale.":"Down two but loads of time — don't panic, raise tempo one notch and trust the chances.";
  else if(sit==='losing1') note = late?"Go for it now: push the full-backs and your support winger to Attack.":"Stay calm — you're creating, just lift the tempo and width.";
  else if(sit==='drawing') note = opp==='weaker'?"You should beat this lot — go and win it.":opp==='stronger'?"A draw here is a good result — don't get greedy and lose it.":"Trust the plan; the late surge usually comes if you stay patient.";
  else if(sit==='winning1') note = late?"Protect it: both inside forwards to Support, slow it right down, defend the box.":"Don't get complacent — keep the press on, a 2nd goal kills the game.";
  else note = late?"Game's won — rest a key man or two and protect legs for next match.":"Stay professional, don't ease off until it's truly safe.";
  if(men==='down') note += " ⚠️ A man down: go compact 4-4-1, protect the box, hit on the break.";
  if(men==='up') note += " ✅ Extra man: stretch the play wide and be patient — overload them.";
  return {m,idx,poss,def,subs,note};
}
function vMatchday(){
  const a=mdAdvice();
  const seg=(k,opts)=>opts.map(([v,l])=>`<button class="${MD[k]===v?'on':''}" onclick="setMD('${k}','${v}')">${l}</button>`).join("");
  // fitness watch from XI starters
  const starters=Object.values(bestXI().assign).map(x=>x.p);
  const tired=starters.filter(p=>A(p,'Sta')<13||A(p,'Nat')<11).map(p=>`${esc(last(p.name))} <span class="muted">(Sta ${A(p,'Sta')}/Nat ${A(p,'Nat')})</span>`);
  const OI={
    possession:["Press their centre-backs & deep midfielder hard","Higher defensive line, close down the goalkeeper's short distribution","Tight-mark their deepest playmaker"],
    counter:["Sit a touch deeper, don't over-commit both full-backs","Stay compact between the lines — deny the space they run into","Lower the tempo of YOUR build-up so you're set when you lose it"],
    targetman:["Man-mark their target man with your best aerial CB","Defend crosses (not the cross) · drop your line a little","Show their wide men down the line, away from the box"],
    wingers:["Show wingers INSIDE onto their weaker foot","Have the inside forward + full-back double up on them","Don't get caught with high full-backs — pick Support duty"],
    playmaker:["Tight-mark + hard-tackle their number 10","Your nearest defensive mid picks him up everywhere","Cut the supply: press the man feeding him"]
  };
  const archLabels={possession:"Possession / plays out from the back",counter:"Counter-attacking & direct",targetman:"Target man & crosses",wingers:"Fast wingers out wide",playmaker:"Star number 10 / playmaker"};
  return `<div class="card">
    <h2>⚡ In-Match Assistant</h2>
    <p class="sub">Set the situation and get exactly what to change — mentality, instructions and the sub to make. Use it live while the match is paused.</p>
    <h3 style="margin-top:6px">Minute: <b style="color:var(--brand)">${MD.min}'</b></h3>
    <input type="range" min="0" max="95" value="${MD.min}" style="width:100%" oninput="MD.min=+this.value;render()">
    <h3>Score situation</h3><div class="seg">${seg('sit',[['winningBig','🟢 Winning 2+'],['winning1','🟢 Winning by 1'],['drawing','🟡 Drawing'],['losing1','🔴 Losing by 1'],['losingBig','🔴 Losing 2+']])}</div>
    <h3>Opponent strength</h3><div class="seg">${seg('opp',[['weaker','Weaker'],['similar','Similar'],['stronger','Stronger']])}</div>
    <h3>Players on pitch</h3><div class="seg">${seg('men',[['up','⬆ Extra man (they got a red)'],['even','11 v 11'],['down','⬇ Down a man (we got a red)']])}</div>
    <div class="card" style="background:linear-gradient(135deg,#0c2b20,#121821);margin-top:14px">
      <div class="row" style="justify-content:space-between"><h3 style="margin:0">📋 Do this now</h3><span class="score" style="background:${a.idx>=5?'#f43f5e':a.idx>=4?'#fbbf24':a.idx<=2?'#38bdf8':'#10b981'};color:#06140d">${a.m}</span></div>
      <p style="margin:10px 0 4px"><b>🎚️ Mentality:</b> ${a.m}</p>
      <p style="margin:4px 0"><b>⚔️ In possession:</b> ${a.poss}</p>
      <p style="margin:4px 0"><b>🛡️ Out of possession:</b> ${a.def}</p>
      <p style="margin:4px 0"><b>🔄 Substitution:</b> ${a.subs}</p>
      <div class="tipbox" style="margin-top:10px">${a.note}</div>
    </div>
    ${tired.length?`<div class="tipbox amber"><b>Fitness watch:</b> these starters tire fast — plan to sub around 60-65': ${tired.join(", ")}.</div>`:''}
  </div>
  <div class="card">
    <h2>🆚 Opposition instructions</h2>
    <p class="sub">Pick how your opponent plays → get the instructions to shut them down.</p>
    <div class="row"><label>Opponent style: <select onchange="oppArch=this.value;render()">${Object.keys(archLabels).map(k=>`<option value="${k}" ${oppArch===k?'selected':''}>${archLabels[k]}</option>`).join("")}</select></label></div>
    <ul class="notice" style="margin-top:10px">${OI[oppArch].map(i=>`<li>${i}</li>`).join("")}</ul>
  </div>
  <div class="card notice">
    <h2>🗣️ Team talks (quick guide)</h2>
    <div class="tablewrap"><table><thead><tr><th>When</th><th>If favourite</th><th>If underdog</th></tr></thead><tbody>
      <tr><td><b>Before kickoff</b></td><td>"I expect a win" (calm/assertive)</td><td>"Relaxed — I have faith in you" (low pressure)</td></tr>
      <tr><td><b>HT — winning</b></td><td>"Pleased, but don't get complacent"</td><td>"Delighted! Keep it up" (passionate)</td></tr>
      <tr><td><b>HT — drawing</b></td><td>"I expect more from you" (demanding)</td><td>"Encouraged — keep going"</td></tr>
      <tr><td><b>HT — losing</b></td><td>Aggressive "Not good enough" IF they played badly; "Unlucky, I have faith" if they played well</td><td>"I have faith in you" (calm)</td></tr>
      <tr><td><b>Full time</b></td><td>Praise a win · constructive after a loss</td><td>Praise effort whatever the result</td></tr>
    </tbody></table></div>
    <div class="tipbox"><b>Rule of thumb:</b> match the body-language to the performance, not just the score. Reading the players' reaction (green = it worked) matters more than the exact words.</div>
  </div>`;
}

/* ============================ IMPORT / FM CONNECT ============================ */
function parseFMHtml(text){
  const recs=[];
  try{const doc=new DOMParser().parseFromString(text,"text/html");const table=doc.querySelector("table");if(table){const ths=[...table.querySelectorAll("th")].map(t=>t.textContent.trim());[...table.querySelectorAll("tr")].forEach(tr=>{const tds=[...tr.querySelectorAll("td")];if(!tds.length)return;const rec={};tds.forEach((td,i)=>{if(ths[i]!==undefined)rec[ths[i]]=td.textContent.trim();});if(Object.keys(rec).length)recs.push(rec);});}}catch(e){}
  return recs;
}
function applyImport(text,label){
  const recs=parseFMHtml(text);
  if(recs.length<1){toast("Couldn't find a player table");return false;}
  STATE.current={label:label||("Update "+todayStr()),date:todayStr(),records:recs};save();
  toast("Loaded "+recs.length+" players");return true;
}
function openImport(){
  document.getElementById("modal").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <span class="x" onclick="closeModal()">✕</span><h2 style="margin:0 0 4px">📥 Import FM export</h2>
    <p class="sub">Drop or paste your <code>Untitled.html</code>. Includes Name, Age, Position, attributes & your role column.</p>
    <div id="drop" class="drop">📂 <b>Drop Untitled.html here</b><br><span class="muted">or click to choose</span></div>
    <input type="file" id="impFile" accept=".html,.htm,.txt" class="hidden">
    <textarea id="impText" placeholder="…or paste the HTML / table text" style="margin-top:10px"></textarea>
    <div class="row" style="margin-top:10px"><input type="text" id="impLabel" placeholder="Label (e.g. Jan 2027)" value="Update ${todayStr()}"><button class="btn primary" onclick="doImport()">Load</button>
    ${window.showOpenFilePicker?`<button class="btn gold" onclick="connectFM()">🔗 Connect for 1-click refresh</button>`:''}</div>
  </div></div>`;
  const drop=document.getElementById("drop"),file=document.getElementById("impFile");
  drop.onclick=()=>file.click();
  file.onchange=e=>{const f=e.target.files[0];if(f)f.text().then(t=>{document.getElementById("impText").value=t;toast("File read — click Load");});};
  ["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("hot");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("hot");}));
  drop.addEventListener("drop",e=>{const f=e.dataTransfer.files[0];if(f)f.text().then(t=>{document.getElementById("impText").value=t;toast("File read — click Load");});});
}
function doImport(){const t=document.getElementById("impText").value.trim();const l=document.getElementById("impLabel").value.trim();if(!t){toast("Paste or drop first");return;}if(applyImport(t,l)){closeModal();go("dash");}}
function saveSnapshot(){if(!STATE.current)return;STATE.snapshots.push(JSON.parse(JSON.stringify({label:STATE.current.label,date:STATE.current.date,records:STATE.current.records})));save();toast("Snapshot saved ("+STATE.snapshots.length+")");render();}

/* File System Access API — connect once, refresh in 1 click */
function idb(cb){const o=indexedDB.open("fmtm_fs",1);o.onupgradeneeded=()=>o.result.createObjectStore("kv");o.onsuccess=()=>cb(o.result);o.onerror=()=>cb(null);}
function idbSet(k,v){return new Promise(r=>idb(db=>{if(!db)return r(false);const t=db.transaction("kv","readwrite");t.objectStore("kv").put(v,k);t.oncomplete=()=>r(true);t.onerror=()=>r(false);}));}
function idbGet(k){return new Promise(r=>idb(db=>{if(!db)return r(null);const req=db.transaction("kv").objectStore("kv").get(k);req.onsuccess=()=>r(req.result);req.onerror=()=>r(null);}));}
async function connectFM(){
  if(!window.showOpenFilePicker){toast("Your browser can't auto-connect — use Import");openImport();return;}
  try{
    const [h]=await window.showOpenFilePicker({types:[{description:"FM export",accept:{"text/html":[".html",".htm"]}}]});
    await idbSet("fmHandle",h); STATE.fmConnected=true; save();
    const f=await h.getFile(); if(applyImport(await f.text(),"Update "+todayStr())){closeModal();toast("Connected ✓ — now 1-click refresh");go("dash");}
  }catch(e){ if(e.name!=="AbortError") toast("Connect cancelled"); }
}
async function refreshFM(){
  const h=await idbGet("fmHandle"); if(!h){connectFM();return;}
  try{
    if(h.queryPermission){const p=await h.queryPermission({mode:"read"});if(p!=="granted"){const r=await h.requestPermission({mode:"read"});if(r!=="granted"){toast("Permission needed");return;}}}
    const f=await h.getFile(); if(applyImport(await f.text(),"Update "+todayStr())) go("dash");
  }catch(e){ toast("Couldn't read file — reconnect"); STATE.fmConnected=false; save(); connectFM(); }
}
function refreshOrConnect(){ STATE.fmConnected?refreshFM():connectFM(); }

/* ============================ BACKUP / RESTORE ============================ */
function backup(){const blob=new Blob([JSON.stringify(STATE)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="gaffer-backup-"+todayStr()+".json";a.click();toast("Backup downloaded");}
document.getElementById("restoreFile").onchange=e=>{const f=e.target.files[0];if(!f)return;f.text().then(t=>{try{const s=JSON.parse(t);if(s.settings){STATE=s;save();toast("Restored");go("dash");}else toast("Not a valid backup");}catch(err){toast("Bad file");}});};

/* ============================ BOOT ============================ */
renderTabs(); go("dash");
</script>
