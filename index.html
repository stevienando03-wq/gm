<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gaffer">
<title>Gaffer — FM Team Manager</title>
<style>
:root{
  --bg:#0a0e14; --bg2:#121821; --bg3:#1b2330; --bg4:#232e3d; --line:#28323f;
  --txt:#eaf0f6; --mut:#8a97a8; --brand:#10b981; --brand2:#059669; --accent:#38bdf8; --gold:#fbbf24;
  --gk:#fbbf24; --def:#38bdf8; --mid:#10b981; --att:#f43f5e;
  --r:14px;
}
html[data-theme="light"]{
  --bg:#f4f6f9; --bg2:#ffffff; --bg3:#eef1f6; --bg4:#e2e7ef; --line:#d4dae3;
  --txt:#15202b; --mut:#5b6876; --gold:#b7791f;
}
html[data-theme="light"] header{background:linear-gradient(135deg,#eafaf3,#f4f6f9)}
html[data-theme="light"] .tipbox{background:#eafaf3;border-color:#bfe8d6}
html[data-theme="light"] .tipbox.amber{background:#fdf6e3;border-color:#f0dca8}
html[data-theme="light"] .pitch{box-shadow:inset 0 0 40px #0003}
html[data-theme="light"] .score{color:#fff}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:8px}
a{color:var(--accent)}
header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#0c1f1a 0%,#0a0e14 60%);border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;gap:10px;padding:11px 16px;max-width:1180px;margin:0 auto;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:.2px}
.brand .badge{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 3px 10px #10b98155}
.brand small{color:var(--mut);font-weight:600;font-size:11px;display:block;line-height:1}
.spacer{flex:1}
.btn{background:var(--bg3);color:var(--txt);border:1px solid var(--line);padding:8px 13px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--brand);color:#fff}
.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));border-color:transparent;color:#04130d}
.btn.primary:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent}
.btn.sm{padding:5px 9px;font-size:12px}
.btn.gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#2a1c00;border-color:transparent}
nav.tabs{display:flex;gap:4px;overflow-x:auto;padding:4px 12px 8px;max-width:1180px;margin:0 auto}
nav.tabs button{white-space:nowrap;background:transparent;border:none;color:var(--mut);padding:8px 13px;border-radius:9px;cursor:pointer;font-weight:700;font-size:13px}
nav.tabs button.active{background:var(--bg3);color:#fff;box-shadow:inset 0 0 0 1px var(--line)}
.navbadge{background:var(--brand);color:#04130d;border-radius:10px;padding:0 6px;font-size:10px;font-weight:800}
nav.subtabs{display:none;gap:4px;overflow-x:auto;padding:0 12px 8px;max-width:1180px;margin:0 auto}
nav.subtabs button{white-space:nowrap;background:transparent;border:1px solid var(--line);color:var(--mut);padding:5px 11px;border-radius:20px;cursor:pointer;font-weight:600;font-size:12px}
nav.subtabs button.on{background:var(--brand);border-color:transparent;color:#04130d}
nav.subtabs button:hover{color:var(--txt)}
nav.tabs button:hover{color:var(--txt)}
main{max-width:1180px;margin:0 auto;padding:18px 16px 90px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:16px}
.card h2{margin:0 0 4px;font-size:19px;letter-spacing:-.2px}
.card h3{margin:18px 0 9px;font-size:15px}
.sub{color:var(--mut);font-size:13px;margin:0 0 14px}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
.kpi{background:linear-gradient(160deg,var(--bg3),var(--bg2));border:1px solid var(--line);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.kpi .n{font-size:27px;font-weight:800;line-height:1}
.kpi .l{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin-top:4px}
.kpi .ic{position:absolute;right:10px;top:8px;font-size:22px;opacity:.25}
table{width:100%;border-collapse:collapse;font-size:13px}
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{position:sticky;top:0;background:var(--bg3);cursor:pointer;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;z-index:1}
th:hover{color:var(--txt)}
tbody tr{cursor:pointer}
tbody tr:hover{background:#19222e}
.score{font-weight:800;padding:3px 9px;border-radius:7px;color:#06140d;display:inline-block;min-width:46px;text-align:center;font-variant-numeric:tabular-nums}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid currentColor}
.pill.gk{color:var(--gk)}.pill.def{color:var(--def)}.pill.mid{color:var(--mid)}.pill.att{color:var(--att)}
select,input[type=number],input[type=text]{background:var(--bg3);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:13px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.muted{color:var(--mut)}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:7px;display:inline-block}
.tag.good{background:#0c2c1c;color:#34d399}.tag.warn{background:#332408;color:#fbbf24}
.tag.bad{background:#331317;color:#fb7185}.tag.info{background:#0c2638;color:#7dd3fc}
.pitchwrap{display:grid;grid-template-columns:1.25fr 1fr;gap:18px}
@media(max-width:840px){.pitchwrap{grid-template-columns:1fr}.pitch{max-width:430px;margin:0 auto}}
.pitch{position:relative;width:100%;aspect-ratio:68/96;background:linear-gradient(0deg,#15532f,#1a6638);border:2px solid #2e7d4e;border-radius:14px;overflow:hidden;box-shadow:inset 0 0 60px #0006}
.pitch::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,#ffffff05 0 9.9%,#ffffff00 9.9% 20%)}
.pline{position:absolute;border:2px solid #ffffff40}
.pl-center{left:6%;right:6%;top:50%;height:0}
.pl-circle{left:37%;width:26%;top:43%;aspect-ratio:1;border-radius:50%}
.pl-boxT{left:23%;width:54%;top:0;height:13%;border-top:none}
.pl-boxB{left:23%;width:54%;bottom:0;height:13%;border-bottom:none}
.slot{position:absolute;transform:translate(-50%,-50%);width:70px;text-align:center;cursor:pointer;z-index:2}
.slot .dot{width:48px;height:48px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#06140d;border:2px solid #0a0e14;box-shadow:0 3px 10px #0009}
.slot .nm{font-size:11px;margin-top:4px;font-weight:700;text-shadow:0 1px 4px #000;line-height:1.1;color:#fff}
.slot .ro{font-size:9px;color:#bfe6cf;text-shadow:0 1px 2px #000;font-weight:700}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--mut);margin-top:10px}
.dotleg{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:middle;margin-right:5px}
details{background:var(--bg3);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:10px}
summary{cursor:pointer;font-weight:700}
.def-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;font-size:12px}
.def-grid div{background:var(--bg2);padding:6px 9px;border-radius:7px;border:1px solid var(--line)}
.notice{font-size:13.5px;line-height:1.65}
.notice li{margin-bottom:5px}
.flex2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.flex2{grid-template-columns:1fr}}
.drop{border:2px dashed var(--line);border-radius:12px;padding:26px;text-align:center;color:var(--mut);cursor:pointer}
.drop.hot{border-color:var(--brand);color:var(--txt);background:#0c1f17}
textarea{width:100%;min-height:120px;background:var(--bg3);color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:10px;font-family:ui-monospace,monospace;font-size:12px}
.hidden{display:none!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--brand);padding:11px 18px;border-radius:11px;z-index:300;font-weight:700;box-shadow:0 8px 26px #000a}
.tipbox{background:#0c1f17;border:1px solid #16543a;border-radius:11px;padding:13px 15px;margin:11px 0}
.tipbox.amber{background:#291e07;border-color:#5a4313}
.tipbox b{color:var(--brand)}
.tipbox.amber b{color:var(--gold)}
.barmini{height:7px;background:var(--bg4);border-radius:5px;overflow:hidden;min-width:54px;flex:1}
.barmini i{display:block;height:100%;border-radius:5px}
hr{border:none;border-top:1px solid var(--line);margin:16px 0}
code{background:var(--bg3);padding:1px 5px;border-radius:5px;font-size:12px}
.overlay{position:fixed;inset:0;background:#000a;backdrop-filter:blur(3px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow:auto}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:16px;max-width:760px;width:100%;padding:20px;box-shadow:0 20px 60px #000b;margin:auto}
.modal .x{float:right;cursor:pointer;font-size:22px;color:var(--mut);line-height:1}
.attrrow{display:grid;grid-template-columns:34px 1fr 28px;gap:8px;align-items:center;margin:3px 0;font-size:12px}
.attrrow .an{color:var(--mut)}
.attrrow .av{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.attrcols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:680px){.attrcols{grid-template-columns:1fr}}
.rolefit{display:grid;grid-template-columns:120px 1fr 46px;gap:9px;align-items:center;margin:5px 0;font-size:12px}
.fchips{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 12px}
.fchip{font-size:11px;background:var(--bg3);border:1px solid var(--line);border-radius:7px;padding:3px 8px}
.fchip b{color:var(--mut);font-weight:700}
.seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.seg button{background:var(--bg3);border:1px solid var(--line);color:var(--mut);padding:7px 13px;border-radius:9px;cursor:pointer;font-weight:700;font-size:13px}
.seg button.on{background:var(--bg4);color:#fff;border-color:var(--brand)}
.chartbar{display:flex;align-items:flex-end;gap:4px;height:90px;padding-top:6px}
.chartbar .cb{flex:1;background:linear-gradient(180deg,var(--brand),var(--brand2));border-radius:4px 4px 0 0;min-height:3px;position:relative}
.chartbar .cb span{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:10px;color:var(--mut)}
.depthcell{display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><span class="badge">⚽</span><div>Gaffer<small>FM Team Manager · 4-2-3-1</small></div></div>
    <span class="spacer"></span>
    <button class="btn sm" title="Search players" onclick="openSearch()">🔍</button>
    <button class="btn sm primary" id="refreshBtn" onclick="refreshOrConnect()">🔗 Connect FM</button>
    <button class="btn sm" onclick="openImport()">📥 Import</button>
    <button class="btn sm" onclick="backup()">💾 Backup</button>
    <button class="btn sm ghost" title="Text size" onclick="cycleText()">🔠</button>
    <button class="btn sm ghost" onclick="document.getElementById('restoreFile').click()">↩</button>
    <input type="file" id="restoreFile" accept="application/json" class="hidden">
  </div>
  <nav class="tabs" id="tabs"></nav>
  <nav class="subtabs" id="subtabs"></nav>
</header>
<main id="view"></main>
<div id="modal"></div>
<div id="toast" class="toast hidden"></div>

/* ============================ ENGINE (your exact Excel model) ============================ */
function num(v){ const n=parseFloat(v); return isFinite(n)?n:0; }
function footScore(f){ const v=SCORING.footmap[(f||"").trim()]; return v===undefined?0:v; }
function normalize(rec){
  const g=k=>rec[k]!==undefined?rec[k]:"";
  const attrs={}; ATTRS.forEach(a=>attrs[a]=num(g(a)));
  const role=(g("Position/Role/Duty")||"").trim();
  const injury=(g("Injury")||"").trim(), elig=(g("Eligible")||"").trim(), loanFrom=(g("On Loan From")||"").trim();
  return {name:(g("Name")||"").trim(),age:num(g("Age")),position:(g("Position")||"").trim(),lf:(g("Left Foot")||"").trim(),rf:(g("Right Foot")||"").trim(),role:ROLES.includes(role)?role:"",attrs,raw:rec,
    injury,loanFrom,elig,avail:(!injury||injury==="-")&&elig!=="No"};
}
function players(){ return (STATE.current?.records||[]).map(normalize).filter(p=>p.name); }
function scoreExcel(p,role){ if(!SCORING.weights[role])return 0; let D=footScore(p.lf)+footScore(p.rf); const w=SCORING.weights[role]; for(const a of ATTRS) D+=(p.attrs[a]||0)*(w[a]||0); return Math.round(D/SCORING.rolemax[role]*20*100)/100; }
function scoreFA(p,role){ const w=FA_WEIGHTS[role]; if(!w)return 0; let num=0,den=0; for(const a in w){ num+=(p.attrs[a]||0)*w[a]; den+=w[a]; } return den?Math.round(num/den*100)/100:0; }
function scoreFor(p,role){ return scoreProfile()==="fmarena"?scoreFA(p,role):scoreExcel(p,role); }
function bestRole(p){ const isGK=/(^|[ ,/])GK/.test(p.position||""); let best=null,bs=-1; for(const r of ROLES){ if((r.indexOf("SK")===0)!==isGK) continue; const s=scoreFor(p,r); if(s>bs){bs=s;best=r;} } if(best===null){ for(const r of ROLES){const s=scoreFor(p,r);if(s>bs){bs=s;best=r;}} } return {role:best,score:bs}; }
function assignedRole(p){ if(STATE.overrides[p.name]&&ROLES.includes(STATE.overrides[p.name]))return STATE.overrides[p.name]; if(p.role)return p.role; return bestRole(p).role; }
function parsePos(str){ const map={}; (str||"").split(",").forEach(seg=>{seg=seg.trim();if(!seg)return;const m=seg.match(/^([A-Za-z\/]+)\s*(?:\(([^)]*)\))?/);if(!m)return;const toks=m[1].split("/");let sides=(m[2]||"").replace(/[^LRC]/g,"").split("");if(!sides.length)sides=["C"];toks.forEach(t=>{t=t.toUpperCase();map[t]=map[t]||new Set();sides.forEach(s=>map[t].add(s));});}); return map; }
function eligible(p,slot){ const mp=parsePos(p.position); for(const tok in slot.match){ if(mp[tok]) for(const s of slot.match[tok]) if(mp[tok].has(s)) return true; } return false; }
let xiPins={};
function bestXI(opts={}){
  const ps=players().filter(p=>opts.includeUnavailable||p.avail), ya=STATE.settings.youthAge, pairs=[];
  FORMATION.forEach(slot=>ps.forEach(p=>{const s=scoreFor(p,slot.role);const nat=eligible(p,slot);let adj=s-(nat?0:4);if(opts.youthBoost&&p.age<=ya)adj+=opts.youthBoost;if(opts.rotate){const cr=condRank(rawOf(p,KEYS.con));if(cr!=null){if(cr<=2)adj-=6;else if(cr===3)adj-=2.5;}if(/high/i.test(rawOf(p,KEYS.fatigue)||""))adj-=3;}pairs.push({slot,p,score:s,nat,adj});}));
  pairs.sort((a,b)=>b.adj-a.adj);
  const usedP=new Set(),filled={},assign={};
  if(!opts.ignorePins){ for(const sid in xiPins){ const slot=FORMATION.find(s=>s.id===sid), p=ps.find(x=>x.name===xiPins[sid]); if(slot&&p&&!filled[sid]&&!usedP.has(p.name)){ filled[sid]=true; usedP.add(p.name); assign[sid]={p,score:scoreFor(p,slot.role),nat:eligible(p,slot),pinned:true}; } } }
  for(const pr of pairs){ if(filled[pr.slot.id]||usedP.has(pr.p.name))continue; filled[pr.slot.id]=true;usedP.add(pr.p.name);assign[pr.slot.id]={p:pr.p,score:pr.score,nat:pr.nat}; }
  const bench=ps.filter(p=>!usedP.has(p.name)).map(p=>({p,...bestRole(p)})).sort((a,b)=>b.score-a.score).slice(0,STATE.settings.benchSize);
  return {assign,bench,used:usedP};
}
function trainingFor(p){
  const role=assignedRole(p), w=SCORING.weights[role]||{};
  const items=ATTRS.filter(a=>(w[a]||0)>=0.4).map(a=>({a,w:w[a],v:p.attrs[a]||0,gap:(w[a]||0)*Math.max(0,15-(p.attrs[a]||0))}));
  items.sort((x,y)=>y.gap-x.gap);
  const weak=items.filter(i=>i.v<13).slice(0,4);
  const fc={}; weak.forEach(i=>{const f=ATTR_FOCUS[i.a]||"General";(fc[f]=fc[f]||[]).push(i.a);});
  const focuses=Object.entries(fc).sort((a,b)=>b[1].length-a[1].length);
  return {role,fmRole:ROLE_FM[role]||role,weak,focuses};

function scoreColor(s){ if(s>=14)return"#22c55e"; if(s>=12)return"#4ade80"; if(s>=10)return"#a3e635"; if(s>=8)return"#fbbf24"; if(s>=6)return"#fb923c"; return"#f43f5e"; }
function scoreBadge(s){ return `<span class="score" style="background:${scoreColor(s)}">${(+s).toFixed(2)}</span>`; }
function grpOf(role){ if(role.startsWith("SK"))return"gk"; if(role.startsWith("FB")||role.startsWith("BPD"))return"def"; if(role.startsWith("DM")||role.startsWith("IF")||role.startsWith("AM -"))return"mid"; return"att"; }
function rolePill(role){ return `<span class="pill ${grpOf(role)}">${role}</span>`; }
function grpColor(g){ return g=="gk"?"var(--gk)":g=="def"?"var(--def)":g=="mid"?"var(--mid)":"var(--att)"; }
function attrColor(v){ if(v>=15)return"#22c55e"; if(v>=12)return"#a3e635"; if(v>=9)return"#fbbf24"; if(v>=6)return"#fb923c"; return"#f43f5e"; }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.remove("hidden"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.add("hidden"),2400); }
function esc(s){ return (s+"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function last(n){ return n.split(" ").slice(-1)[0]; }

const GROUPS=[

  {id:"decisions",label:"🧭 Decisions",badge:true,views:[["advice","Decisions"]]},

  {id:"season",label:"📝 Season",views:[["season","Season"]]},
  {id:"data",label:"⚙️ Data",views:[["history","Data & settings"]]},
  {id:"help",label:"📖 Help",views:[["notice","Help"]]},
];
function groupOf(view){ return GROUPS.find(g=>g.views.some(v=>v[0]===view)); }
const lastView={};
let TAB="dash";
function adviceCount(){
  try{
    const ps=players(); if(!ps.length) return 0;
    const ya=STATE.settings.youthAge, keep=STATE.settings.youthKeep;
    const starters=new Set(Object.values(bestXI().assign).map(a=>a.p.name)); let n=0;
    n+=ps.filter(p=>!p.avail).length;
    n+=ps.filter(p=>starters.has(p.name)&&((condRank(rawOf(p,KEYS.con))||5)<=3||/high/i.test(rawOf(p,KEYS.fatigue)||""))).length;
    n+=Math.min(6,ps.filter(p=>p.age<=ya&&!starters.has(p.name)&&devProxy(p,bestRole(p).score)>=keep&&(!mins(p)||mins(p)<450)).length);
    n+=Math.min(5,ps.filter(p=>!starters.has(p.name)&&bestRole(p).score>=12).length);
    n+=Math.min(8,ps.filter(p=>/unhappy/i.test(rawOf(p,KEYS.trainhappy)||"")).length);
    return n;
  }catch(e){ return 0; }
}
function renderTabs(){
  const ac=adviceCount();
  document.getElementById("tabs").innerHTML=GROUPS.map(g=>{const active=g.views.some(v=>v[0]===TAB);const lab=(g.badge&&ac>0)?`${g.label} <span class="navbadge">${ac}</span>`:g.label;return `<button class="${active?'active':''}" onclick="goGroup('${g.id}')">${lab}</button>`;}).join("");
  const g=groupOf(TAB), st=document.getElementById("subtabs");
  if(g&&g.views.length>1){ st.style.display="flex"; st.innerHTML=g.views.map(v=>`<button class="${v[0]===TAB?'on':''}" onclick="go('${v[0]}')">${v[1]}</button>`).join(""); }
  else { st.style.display="none"; st.innerHTML=""; }
}
function goGroup(id){ const g=GROUPS.find(x=>x.id===id); go(lastView[id]||g.views[0][0]); }
function go(k){ TAB=k; const g=groupOf(k); if(g)lastView[g.id]=k; renderTabs(); render(); window.scrollTo(0,0); }
function render(){
  document.getElementById("refreshBtn").textContent = STATE.fmConnected ? "🔄 Refresh from FM" : "🔗 Connect FM";
  const v=document.getElementById("view");
  if(!STATE.current){ v.innerHTML=`<div class="card"><h2>No squad loaded</h2><p class="sub">Import your <code>Untitled.html</code> FM export to begin.</p><button class="btn primary" onclick="openImport()">Import now</button></div>`; return; }
  v.innerHTML=({dash:vDash,coach:vCoach,tips:vTips,advice:vAdvice,squad:vSquad,compare:vCompare,xi:vXI,matchday:vMatchday,season:vSeason,setpiece:vSetpiece,reports:vReports,training:vTraining,youth:vYouth,release:vRelease,depth:vDepth,progress:vProgress,tactics:vTactics,history:vHistory,notice:vNotice}[TAB]||vDash)();
  if(TAB==="squad") wireSquad();
}

  <div class="flex2">
    <div class="card">
      <h3 style="margin-top:0">🧭 What to do now</h3>

      ${topRel.length?`<p class="muted" style="margin:8px 0 4px">Consider moving on:</p>${topRel.map(o=>`<div class="row" style="justify-content:space-between"><span><b>${esc(o.p.name)}</b> <span class="muted">${o.p.age}y</span></span>${scoreBadge(o.score)}</div>`).join("")}`:""}
      <p class="muted" style="margin:10px 0 4px">Brightest youth:</p>
      ${topYouth.map(o=>`<div class="row" style="justify-content:space-between"><span><b>${esc(o.p.name)}</b> <span class="muted">${o.p.age}y · ${o.role.split(" ")[0]}</span></span>${scoreBadge(o.score)}</div>`).join("")}

    <div class="card">
      <h3 style="margin-top:0">📊 Age profile</h3>

/* ---------- COACH'S REPORT (personalised analysis) ---------- */
function vCoach(){
  const ps=players(); if(!ps.length) return `<div class="card"><h2>🎓 Coach's report</h2><p class="sub">Import your squad first.</p></div>`;
  const avail=ps.filter(p=>p.avail);
  const pr=squadProfile(), rec=pr?styleRec(pr):null;
  const xi=bestXI(); const xiArr=Object.values(xi.assign); const xiAvg=xiArr.length?xiArr.reduce((s,a)=>s+a.score,0)/xiArr.length:0;
  const ya=STATE.settings.youthAge, keep=STATE.settings.youthKeep;
  const avgAge=ps.reduce((s,p)=>s+p.age,0)/ps.length;
  const youth=ps.filter(p=>p.age<=ya);
  const injured=ps.filter(p=>!p.avail);
  // star: best Av Rat with mins, else best XI score
  const rated=ps.map(p=>({p,rat:parseNumLoose(rawOf(p,KEYS.rat)),m:mins(p)})).filter(o=>o.rat!=null&&o.m&&o.m>=270).sort((a,b)=>b.rat-a.rat);
  const star=rated.length?rated[0]:(xiArr.length?xiArr.slice().sort((a,b)=>b.score-a.score)[0]:null);
  const topYouth=youth.map(p=>({p,...bestRole(p),dev:devProxy(p,bestRole(p).score)})).sort((a,b)=>b.dev-a.dev).slice(0,4);
  const surplus=releaseList();
  // identify the squad's weakest profile dimension
  const dims=pr?[["pace","pace",pr.pace],["aerial","aerial presence",pr.aerial],["technical","technical quality",pr.technical],["engine","stamina/work-rate",pr.engine],["defense","defending",pr.defense],["creativity","creativity",pr.creativity]]:[];
  const weakest=dims.slice().sort((a,b)=>a[2]-b[2])[0], strongest=dims.slice().sort((a,b)=>b[2]-a[2])[0];
  // priorities
  const pri=[];
  if(pr&&pr.engine<10.5) pri.push(["Manage the legs","Your stamina/work-rate is low ("+pr.engine.toFixed(1)+"). <b>Don't press high for 90'</b> — you gas out and concede late. Press in bursts, rotate often, and train Stamina & Natural Fitness."]);
  if(injured.length) pri.push(["Cover the treatment room",injured.length+" player(s) injured. The app already removes them from your XI — line up deputies and <b>lower training intensity</b> to stop the bleeding."]);
  const starved=youth.filter(p=>!new Set(xiArr.map(a=>a.p.name)).has(p.name)&&devProxy(p,bestRole(p).score)>=keep&&(!mins(p)||mins(p)<450));
  if(starved.length) pri.push(["Get the kids minutes",starved.length+" good prospect(s) aren't playing enough. Game time is the #1 driver of development — start them in cups or <b>loan them out</b>."]);
  if(pr&&pr.pace>=13) pri.push(["Use your pace","Your quickest weapon is speed ("+pr.pace.toFixed(1)+"). Play balls in behind and counter — don't slow it down into their block."]);
  if(surplus.length) pri.push(["Trim the deadwood",surplus.length+" surplus player(s) clogging wages/squad slots — loan or release to free space for youth."]);
  while(pri.length<3) pri.push(["Keep developing","Re-import every 6 months and watch Progress climb. Patience compounds in a youth save."]);

  return `<div class="card" style="background:linear-gradient(135deg,#0c2b20,#121821)">
    <h2>🎓 Coach's report — your squad, by me</h2>
    <p class="sub">A full read of <b>your</b> players (not generic advice), updated live from your data. Think of it as me sitting in your dugout.</p>
    <div class="grid kpis">
      <div class="kpi"><div class="n" style="color:${scoreColor(xiAvg)}">${xiAvg.toFixed(1)}</div><div class="l">XI rating</div></div>
      <div class="kpi"><div class="n">${avgAge.toFixed(1)}</div><div class="l">Avg age</div></div>
      <div class="kpi"><div class="n">${youth.length}</div><div class="l">Youth ≤${ya}</div></div>
      <div class="kpi"><div class="n">${injured.length}</div><div class="l">Injured</div></div>
    </div>
  </div>

  ${(()=>{const s=survivalCalc();return s.hasData?`<div class="tipbox amber"><b>🪂 Survival check:</b> ${s.position?s.position+'th, ':''}${s.points} pts from ${s.played} — projected <b>${s.proj}</b> (need ~${SURVIVAL_LINE}). ${s.verdict[1]}. You need ${s.needPpg.toFixed(2)} pts/game from here. Full tracker in <b>Season</b>.</div>`:`<div class="tipbox amber"><b>🪂 You're 20th — a relegation fight.</b> Enter your league standing in <b>Season → Survival tracker</b> and I'll track your survival pace. Everything below is built around staying up.</div>`;})()}
  <div class="card"><h3 style="margin-top:0">1. The honest verdict</h3>
    <p>You're <b>20th in the Premier League</b> — outgunned most weeks — with a <b>young, ${avgAge<22?'very ':''}raw squad</b> (avg ${avgAge.toFixed(1)}, ${youth.length} of ${ps.length} aged ≤${ya}). Survival isn't about out-playing anyone; it's about <b>losing fewer games</b>: banking draws, nicking the six-pointers, and not getting hammered by the top sides. ${pr?`Your <b>biggest strength is ${strongest[1]}</b> (${strongest[2].toFixed(1)}/20), your <b>weakest area is ${weakest[1]}</b> (${weakest[2].toFixed(1)}/20).`:''} ${pr&&pr.engine<10.5?`The low stamina is the key thing — <b>it explains the late goals you concede</b>, so you must not press high for 90'.`:''}</p>
    ${star?`<div class="tipbox"><b>⭐ Build around ${esc(star.p.name)}</b> — ${star.rat?('your form player ('+star.rat.toFixed(2)+' avg). Keep him fit, keep him happy, feed him the ball.'):('your highest-rated performer. He\'s the spine of this team.')}</div>`:''}
  </div>

  ${rec?`<div class="card"><h3 style="margin-top:0">2. How I'd set you up — and why</h3>
    <p><b>${rec.style}.</b> ${rec.why}</p>
    <p><b>Mentality:</b> ${rec.ment}. <b>Key instructions:</b> ${rec.instr.join(" · ")}.</p>
    <div class="tipbox amber"><b>Why this and not all-out attack?</b> A formation alone never beats the match engine. With ${pr.engine<11?'tired young legs':'this squad'}, over-committing gets you countered — that's how small clubs throw away games. Solid shape first, then break with your ${pr.pace>=13?'pace':'best players'}. Closest ready-made setup: <b>Team → Tactics → ${rec.fits==='meta'?'⚔️ Meta Gegenpress':'🛡️ Youth-Safe'}</b>.</div>

  <div class="card"><h3 style="margin-top:0">3. The XI & rotation</h3>

    ${injured.length?`<p class="muted">Out right now: ${injured.map(p=>esc(last(p.name))).join(", ")} — already excluded for you.</p>`:''}
  </div>

  <div class="card"><h3 style="margin-top:0">4. The kids — your whole project</h3>
    <p>This is a youth save, so development <b>is</b> the objective. Your brightest prospects:</p>
    ${topYouth.map(o=>`<div class="row" style="justify-content:space-between;cursor:pointer" onclick="openPlayer('${esc(o.p.name)}')"><span><b>${esc(o.p.name)}</b> <span class="muted">${o.p.age}y · ${o.role.split(" ")[0]}</span></span>${scoreBadge(o.score)}</div>`).join("")}
    <div class="tipbox" style="margin-top:8px"><b>How I'd grow them:</b> real minutes (start in cups, loan the blocked ones), individual <b>role training</b> at <b>Medium intensity</b>, and put any bad-attitude kids with a senior pro mentor. Don't rush them into the XI before they're ready. <span class="muted">(sourced: FM24 youth-development consensus)</span></div>

    <ol>${pri.slice(0,4).map(p=>`<li><b>${p[0]}.</b> ${p[1]}</li>`).join("")}</ol>
  </div>

  <div class="card notice"><h3 style="margin-top:0">6. Tips & tricks for YOUR situation</h3>
    <ul>
      <li><b>Win the second balls</b> with your double pivot — a young side that loses midfield gets overrun. Keep two in there.</li>
      <li><b>Set pieces ≈ a third of goals</b> — for a weaker squad they're the great equaliser. Set the corner routine in <b>Team → Set pieces</b> and pick your tall men.</li>

      <li><b>Patience</b> — you'll still lose some games as a small club; the goal is to stop <i>throwing away</i> winnable ones. Re-import every 6 months and watch the squad (and results) climb.</li>
    </ul>
    <p class="sub">Sourced from the FM24 community (FM-Arena, GiveMeSport, sortitoutsi, footballmanagerblog, Toxigon) and adapted to your fast, young, low-stamina side.</p>
  </div>`;
}

  ["Pick corner targets by JUMPING REACH (15+, ideally 16+), then Heading/Bravery/Strength. Screen the whole squad's Jumping column — one 16+ header runs the exploit.","FM24 weights set pieces to ~3 attributes per role, so one great header is a repeatable weapon a weak squad can build around.","https://www.charlieintel.com/games/how-to-score-and-defend-corners-football-manager-2024-283001/"],
  ["Meta attacking corner: 2 big bodies near post + INSWINGING delivery, 1 at far post for flick-ons, 1 short to drag a marker, best long-shot man on the edge, a man on the keeper, 2 staying back.","It's the consensus routine because the AI marks corners predictably — exactly the matchup a modest squad can win.","https://realsport101.com/article/the-best-football-manager-2024-corner-routine"],
  ["ALWAYS leave one fast attacker forward when defending corners + one on the edge for second balls.","Tailor-made for you: your pace turns their corners into your counters and deters them from over-committing. One sprint costs no stamina.","https://fmwonderkid.com/fm-tips-and-tricks/fm24-tips-and-tricks/set-piece-routines/"],
  ["Assign BACKUP set-piece takers explicitly — there's a bug where your GOALKEEPER takes corners if no assigned taker is on the pitch, and you rotate constantly with 7 injuries.","Stops you wasting set pieces in matches you can't afford to throw.","https://realsport101.com/article/the-best-football-manager-2024-corner-routine"],
  ["Weaponise long throws if anyone has high Long Throws — it's a free extra corner from open play (only customisable in the attacking third).","Every repeatable set-piece source raises a goal-shy survival side's scoring floor at no cost.","https://www.fmscout.com/a-fm24-set-pieces-guide.html"]
 ]},
 {t:"🏋️ Training, youth & the 9 attributes that matter", items:[
  ["Train the 9 that move the needle, in order: Pace, Acceleration, Jumping Reach, then Strength/Balance/Agility, then Anticipation/Concentration, then Dribbling.","A test maxing only these 9 (CA ~80) finished 2nd; a 'balanced' side with them low got relegated. 6 of the 9 are physical — that IS your squad, so your kids are closer to the template than their CA suggests.","https://realsport101.com/article/fm24-only-9-attributes-really-matter-claims-community-test"],
  ["STOP training the green 'key' stats. Passing, Marking, Tackling, Positioning, Vision, Crossing, Technique, Finishing have ~zero measurable match impact in FM24.","Hours on textbook attributes produce no points; a no-transfer manager must spend limited training on what wins games.","https://fm-arena.com/thread/14009-attribute-testing-football-manager-24/"],
  ["Train PHYSICALS now while they're young (fastest growth before ~24): set Quickness & Aerial focuses, gym for Strength. Your 7.8 stamina caps how long you can run — and you can't buy fitness, you must train it.","Physicals develop fastest for under-24s, the biggest near-term return for a relegation fight.","https://fm-arena.com/thread/13924-training-and-age-golden-age-declining-age/"],
  ["Set training intensity DOUBLE for under-23s, but lean on auto-throttle and DON'T stack Weaker Foot + Traits + Additional Focus (each is a hidden intensity multiplier that raises injury risk).","Double intensity is the biggest growth lever, but unmanaged it deepens a 7-injury crisis.","https://www.footballmanagerblog.org/2024/12/develop-young-players-fm24.html"],
  ["Mentoring is your ONLY no-transfer route to raise hidden Professionalism/Determination — one good-personality senior per 2-3 youngsters, grouped by position.","Your core weakness is work-rate/professionalism; raising hidden Professionalism speeds ALL future training.","https://www.videogamer.com/guides/football-manager-2024-fm24-how-to-mentor-players/"],
  ["Loan out fringe kids — your one allowed transfer tool — but ONLY where they're guaranteed starters in a competitive league. After 18, match minutes drive the mental attributes you can't train.","A loan where they start beats them rotting on your bench; bench-warming a loan is wasted development.","https://www.passion4fm.com/using-loans-to-improve-youth-development-on-football-manager/"],
  ["Maximise medical/fitness staff (Sports Science, Physio, Fitness Coach) and run a fitness-first pre-season.","Staff is a rules-safe upgrade that directly attacks your two biggest problems — injuries and fitness.","https://www.givemesport.com/football-manager-2024-medical-centre-guide/"]
 ]},
 {t:"👥 Squad, morale & cohesion — you can't rebuild them cheaply", items:[
  ["Lock in your strongest XI and play it to build Team Cohesion — with no transfers, consistency is your only lever to raise it.","Good→Excellent cohesion measurably improves how the team executes the 4-2-3-1 — the cheapest gain an underdog has.","https://www.charlieintel.com/games/football-manager-2024-best-ways-to-improve-team-cohesion-285653/"],
  ["Read Dynamics fortnightly; identify Team Leaders and NEVER upset one — a leader's unhappiness spreads through the whole squad.","In an academy side a handful of homegrown seniors are irreplaceable leaders; protecting their morale steadies a fragile relegation run.","https://www.givemesport.com/football-manager-2024-dynamics-guide/"],
  ["Manage promises DEFENSIVELY — give vague game-time timelines ('over the season'), never firm guarantees. A broken promise craters morale.","A deep young squad generates constant game-time complaints; loose timelines + the loan valve keep peace without commitments you can't keep.","https://sortitoutsi.net/content/70873/fm24-guide-how-to-avoid-broken-promises-ruining-your-experience"],
  ["Pick your captain from the Leaders tier (Leadership 17+, Determination, Teamwork). A good captain stabilises the squad after a bad run.","Exactly your situation at 20th — it damps the morale swings that spiral an inexperienced dressing room.","https://www.footballmanager.com/the-byline/choosing-perfect-captain-wednesday-wisdom"]
 ]},
 {t:"🧠 Who plays where — match-engine coefficients", items:[
  ["GK (Sweeper Keeper): pick your most AGILE keeper, not best handler (Agility > Reflexes > Aerial). Rushing Out is NEGATIVE — vs top sides consider a plain GK-Defend.","Counter-intuitive, but it's what the engine rewards; aggressive sweeping can cost goals behind a line you can't protect.","https://fm-arena.com/thread/14201-fm24-experiment-update-new-match-engines-most-important-attributes-for-each-respecitve-positions-with-their-coefficients/"],
  ["Full-backs & CBs: pick your FASTEST, springiest defenders. CB top coefficient is Jumping Reach (highest defensive value anywhere) > Pace > Acceleration. A slow 'good defender' is a liability; don't fret a BPD's passing.","Pace/jumping at the back is your insurance against the space any deep block concedes — suits a young athletic squad.","https://fm-arena.com/thread/14201-fm24-experiment-update-new-match-engines-most-important-attributes-for-each-respecitve-positions-with-their-coefficients/"],
  ["Defensive Mid: put your FITTEST, FASTEST midfielder here — Acceleration is the top DM attribute and STAMINA genuinely ranks top-3 (the one outfield slot it does). Run the double pivot to share the running.","A precise fix for your stamina problem — place your best engine where stamina actually counts.","https://fm-arena.com/thread/14201-fm24-experiment-update-new-match-engines-most-important-attributes-for-each-respecitve-positions-with-their-coefficients/"],
  ["Inside Forwards & AMC: stack your fastest, best dribblers here — wide attack is the most pace-dependent role in the engine. Favour a 1v1 dribbler over a clever passer; set IFs to Sit Narrower + Move Into Channels.","This is where your speed edge converts directly into goals.","https://fm-arena.com/thread/14201-fm24-experiment-update-new-match-engines-most-important-attributes-for-each-respecitve-positions-with-their-coefficients/"],
  ["Advanced Forward: pick on JUMPING REACH + PACE, not 'clinical finishing' — Finishing barely beats baseline; a fast, tall striker running in behind outscores a slow natural finisher.","Overturns the most ingrained FM belief — and a fast athletic striker is exactly what a youth academy produces.","https://fm-arena.com/thread/14009-attribute-testing-football-manager-24/"]
 ]},
 {t:"📤 Exporting your squad into Gaffer", items:[
  ["Build ONE reusable FM custom view with every column you want, THEN export via Print Screen > Web Page. FM only exports the columns currently on screen.","A saved view makes each weekly export identical and diffable for week-over-week tracking.","https://www.fmscout.com/a-fm26-player-csv-export.html"],
  ["Include: attributes, Condition/Match Sharpness/Jadedness, Injury Risk, Morale, Training Happiness, Avg Rating/Apps/Mins/Goals/Assists/xG/xA, Home-Grown Status, Eligible, On Loan From, contract & wage.","These drive the rotation, availability, form and finance features — the app lights them up automatically when present.","https://www.passion4fm.com/football-manager-custom-views/"],
  ["Re-import before trusting any fitness/form/injury advice if your data is more than a few days old.","Form, fitness and injuries change every match — the app is only as fresh as your last import.","https://www.fmscout.com/a-fm26-player-csv-export.html"]
 ]}
];
function vTips(){
  const sec = TIPS_DATA.map((s,i)=>`<details ${s.open?'open':''}><summary>${s.t}</summary>
    <div style="margin-top:8px">${s.items.map(it=>`<div style="margin:0 0 10px">
      <div>✅ <b>${it[0]}</b></div>
      <div class="muted" style="font-size:12.5px;margin:2px 0 2px 18px">Why: ${it[1]} ${it[2]?`<a href="${it[2]}" target="_blank" rel="noopener">source ↗</a>`:""}</div>
    </div>`).join("")}</div></details>`).join("");
  return `<div class="card">
    <h2>💡 Tips & Tricks — for YOUR save</h2>
    <p class="sub">A full, sourced playbook for a <b>young, fast, low-stamina, no-transfers side fighting Premier League relegation</b>. Tap a heading to expand. Every "why" links to its source.</p>
    ${sec}
    <div class="tipbox"><b>The one-line version:</b> defend deep, counter with your pace, win set pieces, rotate hard, set opposition instructions every week, and bank draws. You won't out-play the PL — you'll out-prepare it.</div>
  </div>`;
}

/* ---------- SQUAD ---------- */
let squadSort={key:"score",dir:-1}, squadFilter={role:"",q:"",attr:"",minVal:0,ageMax:99};
function squadRows(){
  let rows=players().map(p=>{const r=assignedRole(p);return{p,role:r,score:scoreFor(p,r),best:bestRole(p)};});
  if(squadFilter.role)rows=rows.filter(r=>r.role===squadFilter.role);
  if(squadFilter.q){const q=squadFilter.q.toLowerCase();rows=rows.filter(r=>r.p.name.toLowerCase().includes(q));}
  if(squadFilter.attr&&squadFilter.minVal>0)rows=rows.filter(r=>(r.p.attrs[squadFilter.attr]||0)>=squadFilter.minVal);
  if(squadFilter.ageMax<99)rows=rows.filter(r=>r.p.age<=squadFilter.ageMax);
  const k=squadSort.key,d=squadSort.dir;
  rows.sort((a,b)=>{let va,vb;if(k==="name"){return a.p.name<b.p.name?-d:a.p.name>b.p.name?d:0;}if(k==="age"){va=a.p.age;vb=b.p.age;}else if(k==="role"){return a.role<b.role?-d:a.role>b.role?d:0;}else if(k==="pos"){return a.p.position<b.p.position?-d:a.p.position>b.p.position?d:0;}else{va=a.score;vb=b.score;}return(va-vb)*d;});
  return rows;
}
function vSquad(){
  const rows=squadRows();
  const opts=`<option value="">All roles</option>`+ROLES.map(r=>`<option ${squadFilter.role===r?'selected':''}>${r}</option>`).join("");
  return `<div class="card">
    <h2>👥 Squad — ${rows.length} players</h2>
    <p class="sub">Tap any player for full attributes, role fit, radar & training. Score = fit in the assigned role.</p>
    <div class="row" style="margin-bottom:10px">
      <input type="text" id="sq" placeholder="🔍 Search name…" value="${esc(squadFilter.q)}">
      <select id="sr">${opts}</select>
    </div>
    <div class="row" style="margin-bottom:12px;font-size:12px">
      <span class="muted">Filter:</span>
      <select id="fAttr"><option value="">attribute…</option>${ATTRS.map(a=>`<option value="${a}" ${squadFilter.attr===a?'selected':''}>${a} — ${ATTR_FULL[a]||a}</option>`).join("")}</select>
      <span class="muted">≥</span><input type="number" id="fMin" min="1" max="20" value="${squadFilter.minVal||''}" placeholder="val" style="width:60px">
      <span class="muted">· age ≤</span><input type="number" id="fAge" min="14" max="40" value="${squadFilter.ageMax<99?squadFilter.ageMax:''}" placeholder="any" style="width:60px">
      ${(squadFilter.attr||squadFilter.ageMax<99)?'<button class="btn sm ghost" onclick="squadFilter.attr=\'\';squadFilter.minVal=0;squadFilter.ageMax=99;render()">clear</button>':''}
    </div>
    <div class="row" style="margin-bottom:12px"><button class="btn sm primary" onclick="optimizeRoles()">✨ Auto-assign best roles</button><button class="btn sm ghost" onclick="resetRoles()">reset to FM roles</button><span class="muted" style="font-size:12px">Sets each player to the role he scores highest in (under the active model).</span></div>
    <div class="tablewrap"><table>
      <thead><tr><th data-k="name">Name</th><th data-k="age">Age</th><th data-k="pos">Position</th><th data-k="role">Role</th><th data-k="score">Score</th><th>Best</th></tr></thead>
      <tbody>${rows.map(r=>`<tr onclick="openPlayer('${esc(r.p.name)}')">
        <td><b>${esc(r.p.name)}</b>${r.p.injury&&r.p.injury!=="-"?' <span title="'+esc(r.p.injury)+'">🤕</span>':""}${r.p.loanFrom&&r.p.loanFrom!=="-"?' <span title="On loan from '+esc(r.p.loanFrom)+'">🔁</span>':""}</td><td>${r.p.age||""}</td><td class="muted">${esc(r.p.position)}</td>
        <td>${rolePill(r.role)}</td><td>${scoreBadge(r.score)}</td>
        <td>${r.best.role!==r.role?`<span class="muted">${r.best.role.split(" ")[0]} ${r.best.score.toFixed(1)}</span>`:'<span class="tag good">best fit</span>'}</td>
      </tr>`).join("")}</tbody>
    </table></div>
  </div>`;
}
function wireSquad(){
  document.querySelectorAll("#view th[data-k]").forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(squadSort.key===k)squadSort.dir*=-1;else{squadSort.key=k;squadSort.dir=(k==="name"||k==="role"||k==="pos")?1:-1;}render();});
  const sq=document.getElementById("sq"),sr=document.getElementById("sr");
  sq.oninput=()=>{squadFilter.q=sq.value;const pos=sq.selectionStart;render();const el=document.getElementById("sq");el.focus();el.setSelectionRange(pos,pos);};
  sr.onchange=()=>{squadFilter.role=sr.value;render();};
  const fAttr=document.getElementById("fAttr"),fMin=document.getElementById("fMin"),fAge=document.getElementById("fAge");
  if(fAttr)fAttr.onchange=()=>{squadFilter.attr=fAttr.value;render();};
  if(fMin)fMin.oninput=()=>{squadFilter.minVal=+fMin.value||0;const v=fMin.value;render();const el=document.getElementById("fMin");if(el){el.focus();el.value=v;}};
  if(fAge)fAge.oninput=()=>{squadFilter.ageMax=+fAge.value||99;const v=fAge.value;render();const el=document.getElementById("fAge");if(el){el.focus();el.value=v;}};
}

/* ---------- PLAYER MODAL ---------- */
function sparkline(vals,w,h){ w=w||74;h=h||18; if(vals.length<2)return ""; const n=vals.length; const pts=vals.map((v,i)=>[(i/(n-1))*w,(h-2)-(Math.max(0,Math.min(20,v))/20)*(h-4)+1]); const d=pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" "); const up=vals[n-1]-vals[0]; const col=up>0?"#34d399":up<0?"#fb7185":"#8a97a8"; const last=pts[n-1]; return `<svg width="${w}" height="${h}" style="vertical-align:middle"><polyline points="${d}" fill="none" stroke="${col}" stroke-width="1.6"/><circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2" fill="${col}"/></svg>`; }
function attrTrends(name,role){
  const w=SCORING.weights[role]||{};
  const top=ATTRS.filter(a=>(w[a]||0)>0).sort((x,y)=>(w[y]||0)-(w[x]||0)).slice(0,8);
  const snaps=STATE.snapshots.map(sn=>sn.records.map(normalize).find(x=>x.name===name)).filter(Boolean);
  const cur=players().find(p=>p.name===name);
  if(!cur||snaps.length<1) return "";
  const rows=top.map(a=>{ const series=snaps.map(s=>s.attrs[a]||0).concat([cur.attrs[a]||0]); const delta=series[series.length-1]-series[0]; return `<div class="attrrow" style="grid-template-columns:34px 1fr 74px 30px"><span class="an" title="${ATTR_FULL[a]}">${a}</span><span class="muted" style="font-size:11px">${series.join(" → ")}</span><span>${sparkline(series)}</span><span style="text-align:right;font-weight:700;color:${delta>0?'#34d399':delta<0?'#fb7185':'var(--mut)'}">${delta>0?'+':''}${delta}</span></div>`; }).join("");
  return `<h3>📈 Attribute trends <span class="muted" style="font-size:12px;font-weight:400">— across ${snaps.length+1} snapshots</span></h3>${rows}`;
}
function radarSVG(p,role){
  const w=SCORING.weights[role]||{};
  const top=ATTRS.filter(a=>(w[a]||0)>0).sort((x,y)=>(w[y]||0)-(w[x]||0)).slice(0,8);
  if(top.length<3) return "";
  const cx=110,cy=110,R=78,n=top.length;
  const pt=(i,r)=>{const ang=-Math.PI/2+i*2*Math.PI/n;return [cx+r*Math.cos(ang),cy+r*Math.sin(ang)];};
  let grid="";[0.25,0.5,0.75,1].forEach(f=>{const poly=top.map((_,i)=>pt(i,R*f).map(x=>x.toFixed(1)).join(",")).join(" ");grid+=`<polygon points="${poly}" fill="none" stroke="#28323f" stroke-width="1"/>`;});
  let axes="",labels="";
  top.forEach((a,i)=>{const[x,y]=pt(i,R);axes+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#28323f"/>`;const[lx,ly]=pt(i,R+16);const v=p.attrs[a]||0;labels+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="10" fill="#8a97a8" text-anchor="middle" dominant-baseline="middle">${a} <tspan fill="${attrColor(v)}" font-weight="700">${v}</tspan></text>`;});
  const poly=top.map((a,i)=>pt(i,R*Math.min(1,(p.attrs[a]||0)/20)).map(x=>x.toFixed(1)).join(",")).join(" ");
  return `<svg viewBox="0 0 220 220" width="100%" style="max-width:260px;display:block;margin:4px auto">${grid}${axes}<polygon points="${poly}" fill="#10b98155" stroke="#10b981" stroke-width="2"/>${labels}</svg>`;
}
function openPlayer(name){
  const p=players().find(x=>x.name===name); if(!p)return;
  const role=assignedRole(p), tr=trainingFor(p);
  const fits=ROLES.map(r=>({r,s:scoreFor(p,r)})).sort((a,b)=>b.s-a.s);
  const attrCol=g=>`<div><div class="muted" style="font-weight:700;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px">${g}</div>${ATTR_GROUPS[g].map(a=>{const v=p.attrs[a]||0;return `<div class="attrrow" title="${ATTR_FULL[a]}"><span class="an">${a}</span><span class="barmini"><i style="width:${v/20*100}%;background:${attrColor(v)}"></i></span><span class="av" style="color:${attrColor(v)}">${v}</span></div>`;}).join("")}</div>`;
  const baseSnap=STATE.snapshots.length?STATE.snapshots[STATE.snapshots.length-1]:null;
  let progHtml="";
  if(baseSnap){ const b=baseSnap.records.map(normalize).find(x=>x.name===name); if(b){ const dS=Math.round((scoreFor(p,role)-scoreFor(b,role))*100)/100; const ups=ATTRS.filter(a=>(SCORING.weights[role][a]||0)>0&&(p.attrs[a]||0)>(b.attrs[a]||0)).map(a=>`${a}+${(p.attrs[a]||0)-(b.attrs[a]||0)}`); progHtml=`<div class="tipbox"><b>Since "${esc(baseSnap.label)}":</b> score ${dS>=0?'+':''}${dS.toFixed(2)} ${ups.length?'· '+esc(ups.slice(0,10).join(", ")):'· no key gains'}</div>`; } }
  const C=curSym();
  const fchip=(label,keys,fmt)=>{const v=rawOf(p,keys);return v&&v!=="-"?`<span class="fchip"><b>${label}</b> ${fmt?fmt(v):esc(v)}</span>`:"";};
  const facts=[fchip("FM best",KEYS.bestrole,v=>esc(v)+(rawOf(p,KEYS.bestpos)&&rawOf(p,KEYS.bestpos)!=="-"?" ("+esc(rawOf(p,KEYS.bestpos))+")":"")),fchip("Personality",KEYS.pers),fchip("Condition",KEYS.con),fchip("Morale",KEYS.mor),fchip("On loan from",KEYS.loanfrom),fchip("Value",KEYS.val,v=>C+money(parseMoney(v))),fchip("Wage",KEYS.wage,v=>C+money(parseMoney(v))),fchip("Expires",KEYS.exp),fchip("Contract",KEYS.ctype),fchip("Height",KEYS.height),fchip("Caps",["Caps"]),fchip("Homegrown",KEYS.hg)].filter(Boolean).join("");
  const availBanner=!p.avail?`<div class="tipbox amber" style="margin:6px 0 12px;border-color:#7a2a2a;background:#2a1313"><b style="color:#fb7185">🤕 Unavailable</b> — ${p.injury&&p.injury!=="-"?esc(p.injury)+(rawOf(p,KEYS.timeout)?" · out "+esc(rawOf(p,KEYS.timeout)):""):"not eligible"}. Excluded from the Best XI.</div>`:"";
  const ap=rawOf(p,KEYS.apps),gg=rawOf(p,KEYS.gls),as_=rawOf(p,KEYS.ast),rt=rawOf(p,KEYS.rat),xgv=rawOf(p,KEYS.xg);
  const yel=rawOf(p,KEYS.yel),red=rawOf(p,KEYS.red);
  const disc=(yel&&yel!=="-"&&+yel>0)||(red&&red!=="-"&&+red>0)?` · ${yel&&+yel>0?"🟨"+yel:""}${red&&+red>0?" 🟥"+red:""}`:"";
  const statLine=(ap||gg)?`<div class="tipbox" style="margin:4px 0 12px"><b>This season:</b> ${ap&&ap!=="-"?esc(ap)+" apps":""}${gg&&gg!=="-"?" · "+esc(gg)+" gls":""}${as_&&as_!=="-"?" · "+esc(as_)+" ast":""}${rt&&rt!=="-"?" · avg "+esc(rt):""}${xgv&&xgv!=="-"?" · xG "+esc(xgv):""}${disc}</div>`:"";
  document.getElementById("modal").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <span class="x" onclick="closeModal()">✕</span>
    <h2 style="margin:0">${esc(p.name)}</h2>
    <p class="sub">${p.age} y · ${esc(p.position)} · L:${esc(p.lf)||"–"} R:${esc(p.rf)||"–"} &nbsp; ${rolePill(role)} ${scoreBadge(scoreFor(p,role))}</p>
    ${availBanner}
    ${facts?`<div class="fchips">${facts}</div>`:""}
    ${(()=>{const [st,t]=recommendStatus(p);return `<p style="margin:0 0 12px"><span class="tag ${t}">Suggested squad status: ${st}</span></p>`;})()}
    ${statLine}
    <div class="row" style="margin-bottom:12px">
      <label class="muted">Assigned role:
        <select onchange="setRole('${esc(p.name)}',this.value)">
          <option value="">(auto best)</option>${ROLES.map(r=>`<option ${role===r?'selected':''}>${r}</option>`).join("")}
        </select></label>
    </div>
    ${progHtml}
    <h3>🎯 Recommended training</h3>
    <div class="tipbox">
      <b>Individual role training:</b> ${esc(tr.fmRole)}<br>
      ${tr.focuses.length?`<b>Additional focus:</b> ${tr.focuses.map(f=>`${esc(f[0])} <span class="muted">(${f[1].join(", ")})</span>`).join(" · ")}`:`<b>Already strong</b> for this role — keep general role training.`}
    </div>
    ${p.age<=STATE.settings.youthAge?`<h3>🎓 Development plan</h3><div class="tipbox">${devPlan(p).map(s=>`<div style="margin:4px 0"><b>${s[0]}</b> — ${s[1]}</div>`).join("")}</div>`:""}
    <h3>🕸️ Role profile <span class="muted" style="font-size:12px;font-weight:400">— his 8 key attributes for ${esc(role)}</span></h3>

/* ---------- YOUTH ---------- */
function persIsGood(s){ return s&&GOOD_PERS.some(g=>s.toLowerCase().includes(g)); }
function persIsBad(s){ return s&&BAD_PERS.some(g=>s.toLowerCase().includes(g)); }
function devProxy(p,best){ // headroom proxy (FM hides true PA): current fit + youth + determination + attitude
  const det=A(p,'Det');
  let d=best + (21-p.age)*0.35 + (det-11)*0.12;
  const pers=rawOf(p,KEYS.pers);
  if(persIsGood(pers)) d+=0.6; if(persIsBad(pers)) d-=0.9;
  return d;
}
function vYouth(){
  const ya=STATE.settings.youthAge,keep=STATE.settings.youthKeep;
  const hasPers=hasCol(KEYS.pers);
  const ps=players().filter(p=>p.age<=ya).map(p=>{const br=bestRole(p);return{p,role:br.role,score:br.score,dev:devProxy(p,br.score),pers:rawOf(p,KEYS.pers),fmRole:rawOf(p,KEYS.bestrole)};}).sort((a,b)=>b.dev-a.dev);

    return `<tr onclick="openPlayer('${esc(o.p.name)}')"><td><b>${esc(o.p.name)}</b></td><td>${o.p.age}</td><td class="muted">${esc(o.fmRole||o.p.position)}</td><td>${rolePill(o.role)}</td><td>${scoreBadge(o.score)}</td><td><b style="color:${scoreColor(o.dev)}">${o.dev.toFixed(1)}</b></td><td><span class="tag ${tag}">${txt}</span>${hasPers?risk:''}</td></tr>`;

    <p class="sub"><b>Ceiling est.</b> = a development-headroom estimate (FM hides true PA, so this is NOT FM's Potential): current fit + youth + Determination + attitude. Higher = more room to grow. Sorted by it. Change the age cut-off in <b>Data → Settings</b>.</p>

  </div>
  <div class="card notice">
    <h3 style="margin-top:0">📚 Youth development — what the experts say</h3>
    <p class="sub">Sourced from FM24 community guides (not assumptions):</p>

      <li><b>Training intensity Medium / Automatic</b> for youngsters, with rest after matches — high intensity burns them out and causes injuries. <span class="muted">(FM Scout / Passion4FM)</span></li>

/* ---------- DEPTH ---------- */
function vDepth(){
  const ps=players();
  const blocks=DEPTH_GROUPS.map(g=>{
    const cand=ps.filter(p=>eligible(p,g.slot)).map(p=>({p,s:scoreFor(p,g.role)})).sort((a,b)=>b.s-a.s);
    const good=cand.filter(c=>c.s>=11).length;
    const status=good>=2?["good","Solid"]:good==1?["warn","Thin — 1 deep"]:["bad","WEAK — retrain/promote"];
    const list=cand.slice(0,6).map(c=>`<div class="depthcell" onclick="openPlayer('${esc(c.p.name)}')" style="cursor:pointer;margin:3px 0"><span style="min-width:120px"><b>${esc(last(c.p.name))}</b> <span class="muted">${c.p.age}</span></span><span class="barmini"><i style="width:${c.s/20*100}%;background:${scoreColor(c.s)}"></i></span><span style="font-weight:700;color:${scoreColor(c.s)};min-width:34px;text-align:right">${c.s.toFixed(1)}</span></div>`).join("")||'<span class="muted">No natural option.</span>';
    // retraining advisor: non-natural players whose attributes suit this role (no transfers in a youth challenge)
    const usedNames=new Set(cand.map(c=>c.p.name));
    const retrain=good<2?ps.filter(p=>!usedNames.has(p.name)).map(p=>({p,s:scoreFor(p,g.role)})).filter(o=>o.s>=10).sort((a,b)=>b.s-a.s).slice(0,3):[];
    const retrainHtml=retrain.length?`<div class="tipbox amber" style="margin:8px 0 0;padding:8px 10px"><b>🔁 Retrain here:</b> ${retrain.map(o=>esc(last(o.p.name))+" ("+o.s.toFixed(1)+")").join(", ")} — good attributes for this role, just not natural. Set position retraining.</div>`:'';
    return `<div class="card" style="margin-bottom:0"><div class="row" style="justify-content:space-between"><h3 style="margin:0">${g.label}</h3><span class="tag ${status[0]}">${status[1]}</span></div><p class="sub" style="margin:6px 0 8px">${rolePill(g.role)} · ${cand.length} natural · ${good} good (≥11)</p>${list}${retrainHtml}</div>`;
  }).join("");
  // succession: per position, current best (any age) vs best young heir (<=23)
  const succ=DEPTH_GROUPS.map(g=>{
    const cand=ps.filter(p=>eligible(p,g.slot)).map(p=>({p,s:scoreFor(p,g.role)})).sort((a,b)=>b.s-a.s);
    const starter=cand[0];
    const heir=cand.filter(c=>c.p.age<=23&&c.p.name!==(starter&&starter.p.name)).sort((a,b)=>b.s-a.s)[0];
    let st;
    if(!starter) st=["bad","no option"];
    else if(starter.p.age>=29&&(!heir||heir.s<10)) st=["bad","ageing, no heir"];
    else if(heir&&heir.s>=10) st=["good","heir ready"];
    else st=["warn","develop an heir"];
    return {g,starter,heir,st};
  });
  const succRows=succ.map(o=>`<tr><td><b>${o.g.label}</b></td><td>${o.starter?esc(last(o.starter.p.name))+' <span class="muted">'+o.starter.p.age+'</span>':'—'}</td><td>${o.starter?scoreBadge(o.starter.s):'—'}</td><td>${o.heir?esc(last(o.heir.p.name))+' <span class="muted">'+o.heir.p.age+'</span>':'<span class="muted">none</span>'}</td><td>${o.heir?scoreBadge(o.heir.s):'—'}</td><td><span class="tag ${o.st[0]}">${o.st[1]}</span></td></tr>`).join("");
  return `<div class="card"><h2>📊 Squad depth</h2><p class="sub">Per position: your natural options ranked. <span class="tag bad">WEAK</span> = fewer than 2 players ≥11. No transfers in a youth challenge → <b>🔁 Retrain</b> tips show who to convert.</p></div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr))">${blocks}</div>
    <div class="card"><h2>🧬 Succession plan</h2><p class="sub">Every position's current best vs your best young heir (≤23). <span class="tag bad">ageing, no heir</span> = develop or promote a replacement now.</p>
      <div class="tablewrap"><table><thead><tr><th>Position</th><th>Current best</th><th>Fit</th><th>Young heir (≤23)</th><th>Fit</th><th>Status</th></tr></thead><tbody>${succRows}</tbody></table></div>
    </div>`;
}

  const opts=STATE.snapshots.map((s,i)=>`<option value="${i}">${esc(s.label)} (${s.date})</option>`).join("");

function renderProg(){
  const i=+document.getElementById("baseSel").value,base=STATE.snapshots[i];if(!base)return;
  const bm={};base.records.map(normalize).forEach(p=>bm[p.name]=p);
  const rows=players().map(p=>{const b=bm[p.name];if(!b)return null;const role=assignedRole(p),w=SCORING.weights[role]||{};let gain=0,ups=[];ATTRS.forEach(a=>{if((w[a]||0)>0){const d=(p.attrs[a]||0)-(b.attrs[a]||0);if(d!==0){gain+=d;if(d>0)ups.push(a+" +"+d);}}});const sN=scoreFor(p,role),sO=scoreFor(b,role);return{p,role,gain,sN,sO,ds:Math.round((sN-sO)*100)/100,ups};}).filter(Boolean).sort((a,b)=>b.gain-a.gain);
  document.getElementById("progOut").innerHTML=`<div class="tablewrap"><table><thead><tr><th>Name</th><th>Role</th><th>Then→Now</th><th>Δ</th><th>Pts</th><th>Improved</th></tr></thead><tbody>${rows.map(r=>`<tr onclick="openPlayer('${esc(r.p.name)}')"><td><b>${esc(r.p.name)}</b></td><td>${rolePill(r.role)}</td><td class="muted">${r.sO.toFixed(1)}→<b style="color:${scoreColor(r.sN)}">${r.sN.toFixed(1)}</b></td><td><span class="tag ${r.ds>0?'good':r.ds<0?'bad':'info'}">${r.ds>0?'+':''}${r.ds.toFixed(2)}</span></td><td><b style="color:${r.gain>0?'#34d399':r.gain<0?'#fb7185':'var(--mut)'}">${r.gain>0?'+':''}${r.gain}</b></td><td class="muted" style="white-space:normal">${esc(r.ups.slice(0,8).join(", "))}</td></tr>`).join("")}</tbody></table></div>`;
}

/* ---------- TACTICS (two tactics) ---------- */
let tacticSel="survival";
function squadProfile(){
  const xi=bestXI(); const A=Object.values(xi.assign).map(a=>a.p);
  const ps=A.length>=8?A:players().filter(p=>p.avail);
  if(!ps.length) return null;
  const avg=(arr,attrs)=>{ if(!arr.length)return 0; let s=0; arr.forEach(p=>{let t=0;attrs.forEach(a=>t+=(p.attrs[a]||0));s+=t/attrs.length;}); return s/arr.length; };
  const fwd=ps.filter(p=>{const m=parsePos(p.position);return m.ST||m.AM;});
  const def=ps.filter(p=>{const m=parsePos(p.position);return m.D;});
  const mid=ps.filter(p=>{const m=parsePos(p.position);return m.DM||m.M||m.AM;});
  const strikers=ps.filter(p=>parsePos(p.position).ST);
  return {
    pace: avg(fwd.length?fwd:ps,["Pac","Acc"]),
    aerial: avg([...def,...strikers].length?[...def,...strikers]:ps,["Jum","Hea","Str"]),
    technical: avg(fwd.length?fwd:ps,["Dri","Tec","Fir"]),
    engine: avg(ps,["Sta","Wor","Nat"]),
    defense: avg(def.length?def:ps,["Tck","Mar","Pos","Cnt"]),
    creativity: avg(mid.length?mid:ps,["Pas","Vis","OtB"])
  };
}
function styleRec(pr){
  const hi=v=>v>=13, lo=v=>v<10.5;
  let style,why,ment,instr;
  if(hi(pr.pace)&&pr.engine>=12){ style="⚡ High press & quick transitions"; ment="Positive → Attacking"; why="You have pace up front AND the legs to press — hunt the ball high and break fast."; instr=["Higher line + higher press (in bursts)","Counter + Counter-press","Run at them — direct, quick tempo, get in behind"]; }
  else if(hi(pr.pace)){ style="🏃 Counter-attack with pace"; ment="Positive"; why="Quick forwards but not the stamina to press 90' — sit a touch deeper and spring fast."; instr=["Standard/Lower line, mid-block","Counter — hit them in transition","Balls in behind for your runners"]; }
  else if(hi(pr.aerial)&&!hi(pr.technical)){ style="🎯 Direct & wing play"; ment="Positive"; why="Strong/tall but not quick or silky — get it wide and cross to your big men."; instr=["Wider attacking width, overlap","Whip crosses to the back/near post","Win the second balls in midfield"]; }
  else if(hi(pr.technical)&&!hi(pr.pace)){ style="🎽 Patient possession"; ment="Positive"; why="Technical but slow — keep the ball, move them around, don't get caught in foot races."; instr=["Shorter passing, work into the box","Lower tempo, play out of defence","Higher line to compress space (only if defenders cope)"]; }
  else if(hi(pr.defense)&&pr.pace<12&&pr.technical<12){ style="🛡️ Solid counter (park-and-break)"; ment="Cautious → Positive"; why="Your strength is defending — stay compact, frustrate them, nick it on the break & set pieces."; instr=["Lower line, deeper block, stay compact","Counter, distribute to the flanks","Make set pieces a weapon"]; }
  else { style="⚖️ Balanced 4-2-3-1"; ment="Positive"; why="No standout strength yet — keep it balanced, solid shape, and develop the squad."; instr=["Shorter passing, work into the box","Mid-block, press more often (not 'much')","Keep one IF on Support to protect the full-back"]; }
  return {style,why,ment,instr,fits:hi(pr.pace)&&pr.engine>=12?"meta":"safe"};
}

/* ============================ SET PIECES & LEADERS ============================ */
function A(p,a){ return p.attrs[a]||0; }
function pickTop(fn,n){ return players().map(p=>({p,v:fn(p)})).sort((a,b)=>b.v-a.v).slice(0,n); }
function inXIset(){ return new Set(Object.values(bestXI().assign).map(a=>a.p.name)); }
function spTag(name,set){ return set.has(name)?'<span class="tag good" style="margin-left:6px">XI</span>':'<span class="tag warn" style="margin-left:6px">bench</span>'; }
function spTable(list,set,fmt){ return `<div class="tablewrap"><table><tbody>${list.map((o,i)=>`<tr onclick="openPlayer('${esc(o.p.name)}')"><td style="width:26px;color:var(--mut)">${i+1}</td><td><b>${esc(o.p.name)}</b>${spTag(o.p.name,set)}</td><td class="muted">${esc(o.p.position)}</td><td style="text-align:right">${fmt(o)}</td></tr>`).join("")}</tbody></table></div>`; }
function vSetpiece(){

  const corner=pickTop(p=>A(p,'Cor')*0.6+A(p,'Tec')*0.25+A(p,'Vis')*0.15,3);
  const fk=pickTop(p=>A(p,'Fre')*0.6+A(p,'Tec')*0.25+A(p,'Cmp')*0.15,3);

  const captain=pickTop(p=>A(p,'Ldr')*0.45+A(p,'Det')*0.25+A(p,'Cmp')*0.15+A(p,'Tea')*0.15,4);
  const fast=pickTop(p=>A(p,'Pac')*0.6+A(p,'Acc')*0.4,3);
  const throwWeapon = lthrow.length && lthrow[0].v>=14;
  return `<div class="card">
    <h2>🎯 Set pieces & leaders</h2>

      <div><h3 style="margin-top:0">⚽ Penalty taker order</h3>${spTable(pen,set,o=>'<b>'+Math.round(o.v)+'</b>')}<p class="sub" style="margin-top:6px">Order = your shootout list too. Top man takes match penalties.</p></div>
      <div><h3 style="margin-top:0">🚩 Corners</h3>${spTable(corner,set,o=>'Cor '+A(o.p,'Cor'))}<h3>🎯 Direct free kicks</h3>${spTable(fk,set,o=>'Fre '+A(o.p,'Fre'))}</div>
    </div>
    <h3>🛬 Attacking set-piece targets (who to send into the box)</h3>
    ${spTable(aerial,set,o=>'Jump '+A(o.p,'Jum')+' · Head '+A(o.p,'Hea'))}
    <h3>📐 Attacking corner — who goes where (set this in FM)</h3>
    ${(()=>{const lon=pickTop(p=>A(p,"Lon")*0.7+A(p,"Tec")*0.3,1)[0];const rows=[
      ["Near post — flick-on",aerial[0]],["Far post — attack ball",aerial[1]],["Penalty spot — attack ball",aerial[2]],
      ["Edge of area — knock-downs / long shot",lon],["Stay forward (counter)",fast[0]],["Corner taker",corner[0]]
    ];return `<div class="tablewrap"><table><tbody>${rows.map(r=>`<tr><td class="muted">${r[0]}</td><td onclick="openPlayer('${esc(r[1].p.name)}')" style="cursor:pointer"><b>${esc(r[1].p.name)}</b></td></tr>`).join("")}</tbody></table></div>`;})()}
    <p class="sub">Keep <b>2 men back</b> (your slowest defenders) so a cleared corner doesn't become their counter. Mirror this for wide free kicks.</p>

  </div>`;
}

/* ============================ IN-MATCH ASSISTANT ============================ */
const MENT=['Very Defensive','Defensive','Cautious','Balanced','Positive','Attacking','Very Attacking'];
let MD={min:75, sit:'losing1', opp:'similar', men:'even'};
let oppArch="possession";
function setMD(k,v){ MD[k]=v; render(); }
function mdAdvice(){
  const {min,sit,opp,men}=MD;
  const late=min>=78, vl=min>=88;
  let idx;
  if(sit==='losingBig') idx = late?6:5;
  else if(sit==='losing1') idx = vl?6:late?5:4;
  else if(sit==='drawing') idx = late?4:3;
  else if(sit==='winning1') idx = late?2:3;
  else if(sit==='winningBig') idx = late?1:2;
  else idx=3;
  // opponent strength
  if(opp==='weaker') idx+=1;
  if(opp==='stronger') idx-=1;
  // man advantage
  if(men==='up') idx+=1;
  if(men==='down') idx-=2;
  // floors/ceilings: if losing and late, never go below Positive
  if((sit==='losing1'||sit==='losingBig') && late) idx=Math.max(idx,5);
  if((sit==='winning1'||sit==='winningBig') && late) idx=Math.min(idx,3);
  idx=Math.max(0,Math.min(6,idx));
  const m=MENT[idx];
  let poss,def,subs,note;
  if(idx>=5){ poss="Higher tempo · more risky/direct passes · full-backs & wingers join attacks · pack the box · 'Be more expressive'"; def="Higher line + higher press to win it back fast (watch the counter)"; subs="Throw on a fresh striker/winger for a defensive mid — go 4-2-4 / 4-3-3 shape"; }
  else if(idx===4){ poss="Keep tempo up · work ball into box · run at them"; def="Standard press, stay compact"; subs="Like-for-like fresh legs up front"; }
  else if(idx===3){ poss="Play the percentages, hold your shape, don't force it"; def="Standard block"; subs="Only if someone's tiring or carded"; }
  else { poss="Lower tempo · retain possession · take it to the corner flags · fewer men forward · waste time"; def="Drop deeper (mid/low block) · don't dive into tackles · mark tight in the box"; subs="Fresh legs in midfield + an extra defensive mid or centre-back to see it out"; }
  // situational note
  if(sit==='losingBig') note = late?"Kitchen-sink time — but keep ONE quick man back so a 3rd goal doesn't kill morale.":"Down two but loads of time — don't panic, raise tempo one notch and trust the chances.";
  else if(sit==='losing1') note = late?"Go for it now: push the full-backs and your support winger to Attack.":"Stay calm — you're creating, just lift the tempo and width.";
  else if(sit==='drawing') note = opp==='weaker'?"You should beat this lot — go and win it.":opp==='stronger'?"A draw here is a good result — don't get greedy and lose it.":"Trust the plan; the late surge usually comes if you stay patient.";
  else if(sit==='winning1') note = late?"Protect it: both inside forwards to Support, slow it right down, defend the box.":"Don't get complacent — keep the press on, a 2nd goal kills the game.";
  else note = late?"Game's won — rest a key man or two and protect legs for next match.":"Stay professional, don't ease off until it's truly safe.";
  if(men==='down') note += " ⚠️ A man down: go compact 4-4-1, protect the box, hit on the break.";
  if(men==='up') note += " ✅ Extra man: stretch the play wide and be patient — overload them.";
  return {m,idx,poss,def,subs,note};
}
function matchdaySubs(idx){
  const xi=bestXI(); const entries=Object.entries(xi.assign).map(([sid,v])=>({sid,p:v.p}));
  const starterNames=new Set(entries.map(e=>e.p.name));
  const bench=players().filter(p=>p.avail && !starterNames.has(p.name));
  if(!bench.length) return "<span class='muted'>No fresh players available on the bench — your hands are tied.</span>";
  const cr=p=>condRank(rawOf(p,KEYS.con))||3;
  const atk=p=>Math.max(scoreFor(p,"AF - Attack"),scoreFor(p,"IF - Support"),scoreFor(p,"AM - Attack"));
  const def=p=>Math.max(scoreFor(p,"DM - Support"),scoreFor(p,"BPD - Defend"),scoreFor(p,"FB - Attack"));
  const byAtk=bench.slice().sort((x,y)=>(atk(y)+A(y,"Pac")*0.4+cr(y)*0.5)-(atk(x)+A(x,"Pac")*0.4+cr(x)*0.5));
  const byDef=bench.slice().sort((x,y)=>(def(y)+cr(y)*0.5)-(def(x)+cr(x)*0.5));
  const byFresh=bench.slice().sort((x,y)=>cr(y)-cr(x));
  const tiredOff=entries.map(e=>e.p).slice().sort((x,y)=>cr(x)-cr(y))[0];
  const wideOff=entries.filter(e=>["AML","AMR","AMC","ST"].includes(e.sid)).map(e=>e.p).sort((x,y)=>cr(x)-cr(y))[0];
  const dmOff=entries.filter(e=>["DML","DMR"].includes(e.sid)).map(e=>e.p).sort((x,y)=>cr(x)-cr(y))[0];
  const ln=(on,off,why)=>on?`<div style="margin:4px 0">⬆️ <b onclick="openPlayer('${esc(on.name)}')" style="cursor:pointer;color:var(--brand)">${esc(on.name)}</b> <span class="muted">(pace ${A(on,"Pac")}, ${esc(rawOf(on,KEYS.con)||"fresh")})</span>${off?` &nbsp;⬇️ for <b onclick="openPlayer('${esc(off.name)}')" style="cursor:pointer">${esc(last(off.name))}</b>`:""} — <span class="muted">${why}</span></div>`:"";
  if(idx>=6){ // throw everything at it
    return ln(byAtk[0], dmOff||tiredOff, "your best impact sub — fresh legs + pace to chase the game")
      + ln(byAtk[1]&&byAtk[1]!==byAtk[0]?byAtk[1]:null, tiredOff!==dmOff?tiredOff:entries.map(e=>e.p).sort((x,y)=>cr(x)-cr(y))[1], "second attacker — go 4-2-4, sacrifice a holder, flood the box");
  }
  if(idx===5){ // chasing one goal
    return ln(byAtk[0], dmOff||tiredOff, "fresh pace & goal threat to run at tired defenders in the last 25-30 mins");
  }
  if(idx<=2){ // protect the lead
    return ln(byDef[0], wideOff||tiredOff, "shore it up — a fresh defensive-minded player on for a tiring attacker to see it out")
      + (byDef[1]&&cr(tiredOff)<=2?ln(byDef[1], tiredOff, "second defensive change if a starter is gassed/red-zone"):"");
  }
  return ln(byFresh[0], tiredOff, "like-for-like refresh of your most tired starter — keeps intensity up & cuts injury risk");
}

/* ============================ REPORTS (fitness / form / finance / personality) ============================ */
let repSeg="fitness";
function rawOf(p,keys){ if(!p.raw)return null; for(const k of keys){ if(p.raw[k]!==undefined&&(p.raw[k]+"").trim()!=="") return (p.raw[k]+"").trim(); } return null; }
function hasCol(keys){ return players().some(p=>rawOf(p,keys)!==null); }
function parsePct(s){ if(s==null)return null; const m=(s+"").match(/(\d+)/); return m?+m[1]:null; }
function parseNumLoose(s){ if(s==null)return null; const m=(s+"").replace(/,/g,"").match(/-?[\d.]+/); return m?parseFloat(m[0]):null; }
function parseMoney(s){ if(s==null)return null; const str=(s+"").replace(/,/g,""); if(/not for sale|n\/a|^-$|^£?0$/i.test(str.trim()))return 0; const parts=str.split("-"); const t=parts[parts.length-1]; const m=t.match(/([\d.]+)\s*([KMB])?/i); if(!m)return 0; let n=parseFloat(m[1]); const u=(m[2]||"").toUpperCase(); if(u==="K")n*=1e3; if(u==="M")n*=1e6; if(u==="B")n*=1e9; return n; }
function money(n){ if(n==null)return "—"; if(n>=1e6)return (n/1e6).toFixed(2)+"M"; if(n>=1e3)return Math.round(n/1e3)+"K"; return Math.round(n); }

function condRank(s){ if(!s)return null; s=s.toLowerCase(); if(/exhaust|jaded|very tired/.test(s))return 1; if(/tired|poor/.test(s))return 2; if(/fairly good|ok|average|adequate/.test(s))return 3; if(/very good|good/.test(s))return 4; if(/excellent|superb|peak/.test(s))return 5; return 3; }

function buildMentorGroups(){
  if(!hasCol(KEYS.pers)) return "";
  const ps=players(), ya=STATE.settings.youthAge;
  const mentors=ps.filter(p=>p.age>=25&&persIsGood(rawOf(p,KEYS.pers))&&A(p,"Det")>=13)
    .map(p=>({p,score:A(p,"Det")+A(p,"Ldr")*0.5+(/(model|born leader|charismatic|perfectionist|driven|iron)/i.test(rawOf(p,KEYS.pers)||"")?6:2)}))
    .sort((a,b)=>b.score-a.score);
  const mentees=ps.filter(p=>p.age<=ya&&(persIsBad(rawOf(p,KEYS.pers))||A(p,"Det")<11))
    .map(p=>({p,need:(persIsBad(rawOf(p,KEYS.pers))?2:0)+(11-A(p,"Det"))/11})).sort((a,b)=>b.need-a.need);
  if(!mentors.length||!mentees.length) return `<div class="tipbox"><b>🤝 Mentoring:</b> ${!mentors.length?"No settled senior pro to lead a group yet — develop one first.":"No youngsters need mentoring right now — attitudes look healthy. ✅"}</div>`;
  const nGroups=Math.min(2,mentors.length,Math.max(1,Math.ceil(mentees.length/3)));

  return `<h3>🤝 Suggested mentoring groups</h3>

}

  if(th&&/unhappy/i.test(th)) steps.push(["⚠️ Training mood",`He's <b>unhappy with training</b> — lower his workload or change focus before morale drops.`]);
  if(persIsBad(pers)||A(p,"Det")<11) steps.push(["🤝 Mentor",`Weak personality/Determination — put him in a mentoring group led by a senior pro (good personality, Det ≥14). Personality & mentals transfer.`]);
  if(!m||m<900) steps.push(["⏱️ Minutes",`Only ${m||0} mins. <b>Game time is the #1 driver of development</b> — start him in cups, or <b>loan him out</b> for regular first-team football.`]);
  else steps.push(["⏱️ Minutes",`${m} mins — healthy. Keep him playing regularly.`]);
  if(br.score>=12) steps.push(["🚀 Promote",`Already first-team level (${br.score.toFixed(1)}). Raise his squad status and start him.`]);
  else steps.push(["⏳ Don't rush",`Projected ceiling ${dev.toFixed(1)}. Keep developing — only promote when he's genuinely ready.`]);
  return steps;
}

function recommendStatus(p){
  const {score}=bestRole(p), dev=devProxy(p,score), ya=STATE.settings.youthAge;
  if(score>=14) return ["Star Player","good"];
  if(score>=12) return ["Important Player","good"];
  if(p.age<=ya && dev>=STATE.settings.youthKeep+1) return ["Hot Prospect","info"];
  if(score>=10) return ["Squad Player","info"];
  if(p.age<=ya) return ["Youngster — develop / loan","warn"];
  if(score<STATE.settings.releaseScore) return ["Surplus — loan or release","bad"];
  return ["Fringe / Backup","warn"];
}

let cmpA=null,cmpB=null;

const SURVIVAL_LINE=38;
function survivalCalc(){
  const L=STATE.season.league||{}; const played=+L.played||0, points=+L.points||0, total=38;
  const remaining=Math.max(0,total-played), ppg=played?points/played:0, proj=Math.round(ppg*total);
  const need=Math.max(0,SURVIVAL_LINE-points), needPpg=remaining?need/remaining:0;
  const verdict= proj>=41?["good","On course to stay up"]:proj>=37?["warn","On the line — every point counts"]:["bad","Relegation pace — must improve"];
  return {position:+L.position||0, points, played, remaining, ppg, proj, need, needPpg, verdict, hasData:!!(L.played||L.points)};
}
