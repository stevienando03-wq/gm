<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<title>FM Team Manager — Highway Star 4-2-3-1</title>
<style>
:root{
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --line:#30363d;
  --txt:#e6edf3; --mut:#8b949e; --acc:#2f81f7; --acc2:#1f6feb;
  --green:#2ea043; --lime:#3fb950; --yellow:#d29922; --orange:#db6d28; --red:#da3633;
  --gk:#d29922; --def:#2f81f7; --mid:#3fb950; --att:#da3633;
  --radius:12px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45;-webkit-text-size-adjust:100%}
a{color:var(--acc)}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#0d1117,#0d1117ee);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;gap:10px;padding:10px 14px;max-width:1200px;margin:0 auto;flex-wrap:wrap}
.logo{font-weight:800;font-size:16px;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
.logo b{color:var(--acc)}
.spacer{flex:1}
.btn{background:var(--bg3);color:var(--txt);border:1px solid var(--line);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.btn:hover{border-color:var(--acc)}
.btn.primary{background:var(--acc2);border-color:var(--acc2)}
.btn.primary:hover{background:var(--acc)}
.btn.ghost{background:transparent}
.btn.sm{padding:4px 8px;font-size:12px}
nav.tabs{display:flex;gap:4px;overflow-x:auto;padding:6px 10px;max-width:1200px;margin:0 auto;-webkit-overflow-scrolling:touch}
nav.tabs button{white-space:nowrap;background:transparent;border:none;color:var(--mut);padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px}
nav.tabs button.active{background:var(--bg3);color:var(--txt)}
main{max-width:1200px;margin:0 auto;padding:16px 14px 80px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.card h2{margin:0 0 4px;font-size:18px}
.card h3{margin:18px 0 8px;font-size:15px;color:var(--txt)}
.sub{color:var(--mut);font-size:13px;margin:0 0 12px}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
.kpi{background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:12px}
.kpi .n{font-size:24px;font-weight:800}
.kpi .l{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
table{width:100%;border-collapse:collapse;font-size:13px}
.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:10px}
th,td{padding:7px 9px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{position:sticky;top:0;background:var(--bg3);cursor:pointer;font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
th:hover{color:var(--txt)}
tbody tr:hover{background:#1c2230}
.score{font-weight:800;padding:2px 8px;border-radius:6px;color:#0d1117;display:inline-block;min-width:42px;text-align:center}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid var(--line)}
.pill.gk{color:var(--gk);border-color:var(--gk)}
.pill.def{color:var(--def);border-color:var(--def)}
.pill.mid{color:var(--mid);border-color:var(--mid)}
.pill.att{color:var(--att);border-color:var(--att)}
select,input[type=number],input[type=text]{background:var(--bg3);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:13px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.muted{color:var(--mut)}
.tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}
.tag.good{background:#11331c;color:var(--lime)}
.tag.warn{background:#3a2a0c;color:var(--yellow)}
.tag.bad{background:#3a1414;color:#ff7b72}
.tag.info{background:#0c2a40;color:#79c0ff}
/* Pitch */
.pitchwrap{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
@media(max-width:820px){.pitchwrap{grid-template-columns:1fr}.pitch{max-width:420px;margin:0 auto}}
.pitch{position:relative;width:100%;aspect-ratio:68/95;background:
  repeating-linear-gradient(0deg,#1b5e20 0 9.5%,#1e6824 9.5% 19%);
  border:2px solid #2e7d32;border-radius:12px;overflow:hidden}
.pitch .line{position:absolute;border:2px solid #ffffff55}
.pitch .center{left:6%;right:6%;top:49%;height:0}
.pitch .circle{left:38%;width:24%;top:43%;aspect-ratio:1;border-radius:50%}
.pitch .boxT{left:24%;width:52%;top:0;height:14%;border-top:none}
.pitch .boxB{left:24%;width:52%;bottom:0;height:14%;border-bottom:none}
.slot{position:absolute;transform:translate(-50%,-50%);width:64px;text-align:center;cursor:pointer}
.slot .dot{width:46px;height:46px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#0d1117;border:2px solid #0d1117;box-shadow:0 2px 8px #0008}
.slot .nm{font-size:11px;margin-top:3px;font-weight:700;text-shadow:0 1px 3px #000;line-height:1.1}
.slot .ro{font-size:9px;color:#cde;text-shadow:0 1px 2px #000}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--mut);margin-top:8px}
.dotleg{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:middle;margin-right:5px}
details{background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px}
summary{cursor:pointer;font-weight:700}
.def-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;font-size:12px}
.def-grid div{background:var(--bg2);padding:5px 8px;border-radius:6px;border:1px solid var(--line)}
.notice{font-size:13.5px;line-height:1.6}
.notice li{margin-bottom:5px}
.flex2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.flex2{grid-template-columns:1fr}}
.drop{border:2px dashed var(--line);border-radius:12px;padding:26px;text-align:center;color:var(--mut);cursor:pointer}
.drop.hot{border-color:var(--acc);color:var(--txt);background:#0c1d33}
textarea{width:100%;min-height:120px;background:var(--bg3);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:10px;font-family:ui-monospace,monospace;font-size:12px}
.hidden{display:none!important}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--acc);padding:10px 16px;border-radius:10px;z-index:200;font-weight:600;box-shadow:0 6px 20px #000a}
.tipbox{background:#0c1d33;border:1px solid #1f4d7a;border-radius:10px;padding:12px 14px;margin:10px 0}
.tipbox b{color:#79c0ff}
.barmini{height:6px;background:var(--bg3);border-radius:4px;overflow:hidden;min-width:60px}
.barmini i{display:block;height:100%;background:var(--acc)}
hr{border:none;border-top:1px solid var(--line);margin:16px 0}
code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo">⚽ <span>FM <b>Team Manager</b></span></div>
    <span class="muted" id="seasonLabel" style="font-size:12px"></span>
    <span class="spacer"></span>
    <button class="btn sm" onclick="go('import')">📥 Update data</button>
    <button class="btn sm" onclick="backup()">💾 Backup</button>
    <button class="btn sm ghost" onclick="document.getElementById('restoreFile').click()">↩ Restore</button>
    <input type="file" id="restoreFile" accept="application/json" class="hidden">
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>
<main id="view"></main>
<div id="toast" class="toast hidden"></div>

/* normalize a raw FM record (column->string) into a clean player */
function normalize(rec){
  const get=k=>rec[k]!==undefined?rec[k]:"";
  const attrs={};
  ATTRS.forEach(a=> attrs[a]=num(get(a)));
  const role = (get("Position/Role/Duty")||"").trim();
  return {
    name:(get("Name")||"").trim(),
    age:num(get("Age")),
    position:(get("Position")||"").trim(),
    lf:(get("Left Foot")||"").trim(),
    rf:(get("Right Foot")||"").trim(),
    role: ROLES.includes(role)?role:"",
    attrs
  };
}
function players(){ return (STATE.current?.records||[]).map(normalize).filter(p=>p.name); }

function scoreFor(p, role){
  if(!SCORING.weights[role]) return 0;
  let D = footScore(p.lf)+footScore(p.rf);
  const w=SCORING.weights[role];
  for(const a of ATTRS) D += (p.attrs[a]||0)*(w[a]||0);
  return Math.round(D/SCORING.rolemax[role]*20*100)/100;
}
function bestRole(p){
  let best=null,bs=-1;
  for(const r of ROLES){ const s=scoreFor(p,r); if(s>bs){bs=s;best=r;} }
  return {role:best, score:bs};
}
/* assigned role = manual override > export role > best-fit */
function assignedRole(p){
  if(STATE.overrides[p.name]&&ROLES.includes(STATE.overrides[p.name])) return STATE.overrides[p.name];
  if(p.role) return p.role;
  return bestRole(p).role;
}

/* ---- position parsing & eligibility ---- */
function parsePos(str){
  const map={};
  (str||"").split(",").forEach(seg=>{
    seg=seg.trim(); if(!seg) return;
    const m=seg.match(/^([A-Za-z\/]+)\s*(?:\(([^)]*)\))?/);
    if(!m) return;
    const toks=m[1].split("/");
    let sides=(m[2]||"").replace(/[^LRC]/g,"").split("");
    if(sides.length===0) sides=["C"];
    toks.forEach(t=>{ t=t.toUpperCase(); map[t]=map[t]||new Set(); sides.forEach(s=>map[t].add(s)); });
  });
  return map;
}
function eligible(p, slot){
  const mp=parsePos(p.position);
  for(const tok in slot.match){
    if(mp[tok]){ for(const s of slot.match[tok]) if(mp[tok].has(s)) return true; }
  }
  return false;
}

/* ---- Best XI (greedy, prefers natural position) ---- */
function bestXI(opts={}){
  const ps=players();
  const youthAge=STATE.settings.youthAge;
  const pairs=[];
  FORMATION.forEach(slot=>{
    ps.forEach(p=>{
      const s=scoreFor(p,slot.role);
      const nat=eligible(p,slot);
      let adj=s-(nat?0:4);
      if(opts.youthBoost && p.age<=youthAge) adj+=opts.youthBoost;
      pairs.push({slot,p,score:s,nat,adj});
    });
  });
  pairs.sort((a,b)=>b.adj-a.adj);
  const usedP=new Set(), filled={}, assign={};
  for(const pr of pairs){
    if(filled[pr.slot.id]||usedP.has(pr.p.name)) continue;
    filled[pr.slot.id]=true; usedP.add(pr.p.name);
    assign[pr.slot.id]={p:pr.p,score:pr.score,nat:pr.nat};
  }
  // bench: best remaining by best-role score
  const bench=ps.filter(p=>!usedP.has(p.name))
    .map(p=>({p,...bestRole(p)})).sort((a,b)=>b.score-a.score)
    .slice(0,STATE.settings.benchSize);
  return {assign,bench};
}

/* ============================ HELPERS / UI ============================ */
function scoreColor(s){
  if(s>=14)return"#2ea043"; if(s>=11)return"#3fb950"; if(s>=8)return"#d29922";
  if(s>=5)return"#db6d28"; return"#da3633";
}
function scoreBadge(s){ return `<span class="score" style="background:${scoreColor(s)}">${s.toFixed(2)}</span>`; }
function grpOf(role){
  if(role.startsWith("SK"))return"gk";
  if(role.startsWith("FB")||role.startsWith("BPD"))return"def";
  if(role.startsWith("DM")||role.startsWith("IF")||role.startsWith("AM -"))return"mid";
  return"att";
}
function rolePill(role){ const g=grpOf(role); return `<span class="pill ${g}">${role}</span>`; }
function grpColor(g){ return g==="gk"?"var(--gk)":g==="def"?"var(--def)":g==="mid"?"var(--mid)":"var(--att)"; }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.remove("hidden"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.add("hidden"),2200); }
function esc(s){ return (s+"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function defaultNextLabel(){ return "Update "+todayStr(); }
function wireImport(){
  const drop=document.getElementById("drop"), file=document.getElementById("impFile");
  if(!drop) return;
  drop.onclick=()=>file.click();
  file.onchange=e=>{ const f=e.target.files[0]; if(f) f.text().then(t=>{document.getElementById("impText").value=t; toast("File loaded — click 'Load this data'");}); };
  ["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("hot");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("hot");}));
  drop.addEventListener("drop",e=>{ const f=e.dataTransfer.files[0]; if(f) f.text().then(t=>{document.getElementById("impText").value=t; toast("File loaded — click 'Load this data'");}); });
}
function parseFMHtml(text){
  let recs=[];
  try{
    const doc=new DOMParser().parseFromString(text,"text/html");
    const table=doc.querySelector("table");
    if(table){
      const ths=[...table.querySelectorAll("th")].map(t=>t.textContent.trim());
      const trs=[...table.querySelectorAll("tr")];
      trs.forEach(tr=>{
        const tds=[...tr.querySelectorAll("td")];
        if(!tds.length) return;
        const rec={}; tds.forEach((td,i)=>{ if(ths[i]!==undefined) rec[ths[i]]=td.textContent.trim(); });
        if(Object.keys(rec).length) recs.push(rec);
      });
    }
  }catch(e){}
  return recs;
}
function doImport(){
  const text=document.getElementById("impText").value.trim();
  const label=document.getElementById("impLabel").value.trim()||defaultNextLabel();
  if(!text){ document.getElementById("impMsg").innerHTML="<span class='tag bad'>Paste or drop your export first.</span>"; return; }
  const recs=parseFMHtml(text);
  if(recs.length<1){ document.getElementById("impMsg").innerHTML="<span class='tag bad'>Couldn't find a player table. Make sure it's the FM 'Web page' export.</span>"; return; }
  STATE.current={label, date:todayStr(), records:recs};
  save();
  toast(`Loaded ${recs.length} players`);
  go("squad");
}
function saveSnapshot(){
  if(!STATE.current){ toast("Nothing to save"); return; }
  STATE.snapshots.push(JSON.parse(JSON.stringify({label:STATE.current.label,date:STATE.current.date,records:STATE.current.records})));
  save(); toast("Snapshot saved ("+STATE.snapshots.length+")"); render();
}

/* ---------- SQUAD ---------- */
let squadSort={key:"score",dir:-1}, squadFilter={role:"",q:""};
function squadRows(){
  let rows=players().map(p=>{ const r=assignedRole(p); return {p,role:r,score:scoreFor(p,r),best:bestRole(p)}; });
  if(squadFilter.role) rows=rows.filter(r=>r.role===squadFilter.role);
  if(squadFilter.q){ const q=squadFilter.q.toLowerCase(); rows=rows.filter(r=>r.p.name.toLowerCase().includes(q)); }
  const k=squadSort.key, d=squadSort.dir;
  rows.sort((a,b)=>{
    let va,vb;
    if(k==="name"){va=a.p.name;vb=b.p.name;return va<vb?-d:va>vb?d:0;}
    if(k==="age"){va=a.p.age;vb=b.p.age;}
    else if(k==="role"){va=a.role;vb=b.role;return va<vb?-d:va>vb?d:0;}
    else if(k==="pos"){va=a.p.position;vb=b.p.position;return va<vb?-d:va>vb?d:0;}
    else {va=a.score;vb=b.score;}
    return (va-vb)*d;
  });
  return rows;
}
function vSquad(){
  const rows=squadRows();
  const opts=`<option value="">All roles</option>`+ROLES.map(r=>`<option ${squadFilter.role===r?'selected':''}>${r}</option>`).join("");
  return `<div class="card">
    <h2>👥 Squad — ${rows.length} players</h2>
    <p class="sub">Score = fit in the assigned role. Change a role from the dropdown; the app remembers it. Best role is auto-suggested.</p>
    <div class="row" style="margin-bottom:10px">
      <input type="text" id="sq" placeholder="Search name…" value="${esc(squadFilter.q)}">
      <select id="sr">${opts}</select>
      <span class="spacer"></span>
      <span class="muted">Avg best-XI score: <b id="avgx"></b></span>
    </div>
    <div class="tablewrap"><table>
      <thead><tr>
        <th data-k="name">Name</th><th data-k="age">Age</th><th data-k="pos">Position</th>
        <th data-k="role">Assigned role</th><th data-k="score">Score</th><th>Best role</th><th>Change role</th>
      </tr></thead>
      <tbody>${rows.map(r=>`
        <tr>
          <td><b>${esc(r.p.name)}</b></td>
          <td>${r.p.age||""}</td>
          <td class="muted">${esc(r.p.position)}</td>
          <td>${rolePill(r.role)}</td>
          <td>${scoreBadge(r.score)}</td>
          <td>${r.best.role!==r.role?`<span class="muted">${r.best.role.split(" ")[0]} ${r.best.score.toFixed(1)}</span>`:'<span class="tag good">best</span>'}</td>
          <td><select data-name="${esc(r.p.name)}" class="roleSel">
            <option value="">(auto)</option>
            ${ROLES.map(x=>`<option ${r.role===x?'selected':''}>${x}</option>`).join("")}
          </select></td>
        </tr>`).join("")}</tbody>
    </table></div>
  </div>`;
}
function wireSquad(){
  document.querySelectorAll("#view th[data-k]").forEach(th=>th.onclick=()=>{
    const k=th.dataset.k; if(squadSort.key===k) squadSort.dir*=-1; else {squadSort.key=k;squadSort.dir=(k==="name"||k==="role"||k==="pos")?1:-1;}
    render();
  });
  const sq=document.getElementById("sq"), sr=document.getElementById("sr");
  sq.oninput=()=>{squadFilter.q=sq.value; const pos=sq.selectionStart; render(); const el=document.getElementById("sq"); el.focus(); el.setSelectionRange(pos,pos);};
  sr.onchange=()=>{squadFilter.role=sr.value; render();};
  document.querySelectorAll(".roleSel").forEach(s=>s.onchange=()=>{
    const n=s.dataset.name; if(s.value) STATE.overrides[n]=s.value; else delete STATE.overrides[n];
    save(); render();
  });
  const xi=bestXI(); const vals=Object.values(xi.assign).map(a=>a.score);
  const avg=vals.length?(vals.reduce((x,y)=>x+y,0)/vals.length):0;
  const el=document.getElementById("avgx"); if(el){el.textContent=avg.toFixed(2); el.style.color=scoreColor(avg);}
}

  const ya=STATE.settings.youthAge, keep=STATE.settings.youthKeep;
  const ps=players().filter(p=>p.age<=ya).map(p=>({p,...bestRole(p)})).sort((a,b)=>b.score-a.score);
  const rows=ps.map(o=>{
    let tag,txt;
    if(o.score>=keep+2){tag="good";txt="First-team ready";}
    else if(o.score>=keep){tag="info";txt="Promising — develop";}
    else if(o.score>=keep-3){tag="warn";txt="Project / loan";}
    else {tag="bad";txt="Low ceiling so far";}
    return `<tr><td><b>${esc(o.p.name)}</b></td><td>${o.p.age}</td><td class="muted">${esc(o.p.position)}</td><td>${rolePill(o.role)}</td><td>${scoreBadge(o.score)}</td><td><span class="tag ${tag}">${txt}</span></td></tr>`;
  }).join("");
  return `<div class="card">
    <h2>🌱 Youth & Training (age ≤ ${ya})</h2>

/* ---------- RELEASE ---------- */
function vRelease(){
  const rs=STATE.settings.releaseScore, ya=STATE.settings.youthAge;
  const list=players().map(p=>({p,...bestRole(p)})).map(o=>{
    let reason=null,tag="warn";
    if(o.score<rs && o.p.age>=24){reason="Below "+rs+" fit and 24+ — won't improve enough.";tag="bad";}
    else if(o.score<rs-2){reason="Very low fit ("+o.score.toFixed(1)+") in his best role.";tag="bad";}
    else if(o.p.age>=32 && o.score<rs+2){reason="Ageing ("+o.p.age+") and only squad-level.";tag="warn";}
    return reason?{...o,reason,tag}:null;
  }).filter(Boolean).sort((a,b)=>a.score-b.score);
  const rows=list.map(o=>`<tr><td><b>${esc(o.p.name)}</b></td><td>${o.p.age}</td><td class="muted">${esc(o.p.position)}</td><td>${rolePill(o.role)}</td><td>${scoreBadge(o.score)}</td><td><span class="tag ${o.tag}">${esc(o.reason)}</span></td></tr>`).join("");
  return `<div class="card">
    <h2>🗑️ Release / Sell list — ${list.length} flagged</h2>
    <p class="sub">Advice, not orders. Threshold = fit below <b>${rs}</b>. Free up wages and squad slots for youth + targeted signings.</p>
    <div class="tablewrap"><table><thead><tr><th>Name</th><th>Age</th><th>Position</th><th>Best role</th><th>Score</th><th>Why</th></tr></thead><tbody>${rows||'<tr><td colspan=6 class="muted">Nobody flagged — healthy squad.</td></tr>'}</tbody></table></div>
    <div class="tipbox"><b>Note:</b> keep a low-scorer only if he's a cheap natural backup for a position you have no youth in. Never sell your only specialist for a slot.</div>
  </div>`;
}

/* ---------- PROGRESSION ---------- */
function vProgress(){
  if(STATE.snapshots.length<1){
    return `<div class="card"><h2>📈 Progression</h2><p class="sub">Save at least one snapshot to compare against. Go to <b>📥 Update data → Save current as snapshot</b>, then import a newer export later and come back here.</p></div>`;
  }
  const opts=STATE.snapshots.map((s,i)=>`<option value="${i}">${esc(s.label)} (${s.date})</option>`).join("");
  return `<div class="card">
    <h2>📈 Progression</h2>
    <p class="sub">Attribute gains in <b>current data</b> vs an older snapshot, for the attributes that matter to each player's role.</p>
    <div class="row"><label>Baseline snapshot: <select id="baseSel" onchange="renderProg()">${opts}</select></label></div>
    <div id="progOut" style="margin-top:12px"></div>
  </div>`;
}
function renderProg(){
  const i=+document.getElementById("baseSel").value;
  const base=STATE.snapshots[i]; if(!base) return;
  const baseMap={}; base.records.map(normalize).forEach(p=>baseMap[p.name]=p);
  const rows=players().map(p=>{
    const b=baseMap[p.name]; if(!b) return null;
    const role=assignedRole(p); const w=SCORING.weights[role]||{};
    let gain=0, ups=[];
    ATTRS.forEach(a=>{ if((w[a]||0)>0){ const d=(p.attrs[a]||0)-(b.attrs[a]||0); if(d!==0){gain+=d; if(d>0)ups.push(a+" +"+d);} } });
    const sNow=scoreFor(p,role), sOld=scoreFor(b,role);
    return {p,role,gain,sNow,sOld,ds:Math.round((sNow-sOld)*100)/100,ups};
  }).filter(Boolean).sort((a,b)=>b.gain-a.gain);
  document.getElementById("progOut").innerHTML=`<div class="tablewrap"><table>
    <thead><tr><th>Name</th><th>Role</th><th>Score then→now</th><th>Δ score</th><th>Attr. points gained</th><th>Improved</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td><b>${esc(r.p.name)}</b></td><td>${rolePill(r.role)}</td>
      <td class="muted">${r.sOld.toFixed(1)} → <b style="color:${scoreColor(r.sNow)}">${r.sNow.toFixed(1)}</b></td>
      <td><span class="tag ${r.ds>0?'good':r.ds<0?'bad':'info'}">${r.ds>0?'+':''}${r.ds.toFixed(2)}</span></td>
      <td><b style="color:${r.gain>0?'var(--lime)':r.gain<0?'#ff7b72':'var(--mut)'}">${r.gain>0?'+':''}${r.gain}</b></td>
      <td class="muted" style="white-space:normal">${esc(r.ups.slice(0,8).join(", "))}</td>
    </tr>`).join("")}</tbody></table></div>`;
}

/* ---------- HISTORY ---------- */
function vHistory(){
  const s=STATE.settings;
  const snapRows=STATE.snapshots.map((sn,i)=>`<tr>
    <td><b>${esc(sn.label)}</b></td><td>${sn.date}</td><td>${sn.records.length}</td>
    <td><button class="btn sm" onclick="loadSnap(${i})">Load</button>
        <button class="btn sm ghost" onclick="delSnap(${i})">Delete</button></td></tr>`).join("");
  // score over time for a player
  const allNames=[...new Set(STATE.snapshots.flatMap(sn=>sn.records.map(r=>r.Name)).concat(players().map(p=>p.name)))].filter(Boolean).sort();
  return `<div class="card">
    <h2>🗂️ History & Settings</h2>
    <h3>Snapshots (${STATE.snapshots.length})</h3>
    <div class="tablewrap"><table><thead><tr><th>Label</th><th>Date</th><th>Players</th><th>Actions</th></tr></thead><tbody>${snapRows||'<tr><td colspan=4 class="muted">No snapshots yet.</td></tr>'}</tbody></table></div>
    <h3>Score over time</h3>
    <div class="row"><label>Player: <select id="histPlayer" onchange="renderHist()"><option value="">— pick —</option>${allNames.map(n=>`<option>${esc(n)}</option>`).join("")}</select></label></div>
    <div id="histOut" style="margin-top:10px"></div>
    <hr>
    <h3>⚙️ Settings</h3>
    <div class="grid kpis">
      <label class="kpi"><div class="l">Youth age ≤</div><input type="number" id="setYouth" value="${s.youthAge}" min="14" max="30"></label>
      <label class="kpi"><div class="l">Release below</div><input type="number" id="setRel" value="${s.releaseScore}" step="0.5" min="0" max="20"></label>
      <label class="kpi"><div class="l">Youth "keep" ≥</div><input type="number" id="setKeep" value="${s.youthKeep}" step="0.5" min="0" max="20"></label>
      <label class="kpi"><div class="l">Bench size</div><input type="number" id="setBench" value="${s.benchSize}" min="3" max="12"></label>
    </div>
    <button class="btn primary" style="margin-top:10px" onclick="saveSettings()">Save settings</button>
    <hr>
    <h3>Danger zone</h3>
    <button class="btn ghost" onclick="if(confirm('Reset everything to the seed squad?')){STATE=blankState();STATE.current={label:'Seed squad',date:todayStr(),records:SEED};save();go('squad');}">Reset app</button>
  </div>`;
}
function loadSnap(i){ const sn=STATE.snapshots[i]; STATE.current={label:sn.label,date:sn.date,records:sn.records}; save(); toast("Loaded "+sn.label); go("squad"); }
function delSnap(i){ if(confirm("Delete this snapshot?")){ STATE.snapshots.splice(i,1); save(); render(); } }
function saveSettings(){
  STATE.settings.youthAge=+document.getElementById("setYouth").value||21;
  STATE.settings.releaseScore=+document.getElementById("setRel").value||9;
  STATE.settings.youthKeep=+document.getElementById("setKeep").value||9.5;
  STATE.settings.benchSize=+document.getElementById("setBench").value||9;
  save(); toast("Settings saved"); render();
}
function renderHist(){
  const n=document.getElementById("histPlayer").value; if(!n){document.getElementById("histOut").innerHTML="";return;}
  const pts=[];
  STATE.snapshots.forEach(sn=>{ const rec=sn.records.find(r=>r.Name===n); if(rec){const p=normalize(rec);const role=assignedRole(p);pts.push({label:sn.label,date:sn.date,score:scoreFor(p,role),role});} });
  const cur=players().find(p=>p.name===n); if(cur){const role=assignedRole(cur);pts.push({label:STATE.current.label+" (current)",date:STATE.current.date,score:scoreFor(cur,role),role});}
  if(!pts.length){document.getElementById("histOut").innerHTML="<p class='muted'>No data points.</p>";return;}
  const max=20;
  document.getElementById("histOut").innerHTML=`<div class="tablewrap"><table><thead><tr><th>Point</th><th>Date</th><th>Role</th><th>Score</th><th></th></tr></thead><tbody>${pts.map(p=>`<tr><td>${esc(p.label)}</td><td>${p.date}</td><td>${rolePill(p.role)}</td><td>${scoreBadge(p.score)}</td><td style="width:140px"><div class="barmini"><i style="width:${p.score/max*100}%;background:${scoreColor(p.score)}"></i></div></td></tr>`).join("")}</tbody></table></div>`;
}

/* ---------- TACTICS ---------- */
function vTactics(){
  return `<div class="card notice">
    <h2>🏆 Highway Star 4-2-3-1 — stop losing</h2>
    <p class="sub">Honest truth first: a formation alone never "beats" the FM match engine. Wins come from <b>role/duty balance + the right mentality + a few key instructions + matching your players' attributes</b>. Your squad already fits these 7 roles, so let's set it up to actually defend and create.</p>

    <div class="tipbox"><b>The #1 reason 4-2-3-1 leaks goals:</b> the two wide AMs (your IFs) don't track back, leaving your full-backs 2v1. Fix = one winger on <b>Support</b>, full-backs not both flying forward, and a holding DM. Details below.</div>

    <h3>Recommended roles & duties (balanced, possession-press)</h3>
    <div class="tablewrap"><table><thead><tr><th>Position</th><th>Role — Duty</th><th>Why</th></tr></thead><tbody>
      <tr><td>GK</td><td><b>Sweeper Keeper — Defend</b></td><td>Your SK role. Sweeps behind a high line, starts moves.</td></tr>
      <tr><td>D R / D L</td><td><b>Full-back — Support</b> (one can be Attack)</td><td>Your FB role. <b>Support on both</b> if you concede on the counter; make the side away from your playmaker the Attack one.</td></tr>
      <tr><td>D C ×2</td><td><b>Ball-Playing Def — Defend</b> + 1 <b>Central Def — Defend</b></td><td>One BPD to start play (your role), one no-nonsense CD for safety.</td></tr>
      <tr><td>DM ×2</td><td><b>Defensive Mid — Defend</b> + <b>Deep-Lying Playmaker — Support</b></td><td>The DLP becomes your metronome; the DM shields the back four. This double pivot is what stops the bleeding.</td></tr>
      <tr><td>AM R</td><td><b>Inside Forward — Attack</b></td><td>Cuts inside onto his stronger foot to shoot.</td></tr>
      <tr><td>AM L</td><td><b>Inside Forward — Support</b></td><td>The tracking one. Keep ONE IF on Support to protect the full-back.</td></tr>
      <tr><td>AM C</td><td><b>Attacking Mid — Attack</b> (or Advanced Playmaker — Support)</td><td>Your AM role; the creative hub between the lines.</td></tr>
      <tr><td>ST</td><td><b>Advanced Forward — Attack</b> (Pressing Forward if you press)</td><td>Your AF role; runs the channels, finishes.</td></tr>
    </tbody></table></div>

    <h3>Team settings that win games in FM24</h3>
    <ul>
      <li><b>Mentality: Positive</b> (not Attacking). Attacking over-commits and gets countered — the classic "all I do is lose" trap.</li>
      <li><b>In possession:</b> Shorter passing, Play out of defence, Work ball into box, Be more disciplined. Width = Fairly Wide.</li>
      <li><b>In transition:</b> Counter-press (only with good Stamina/Work Rate), Distribute to centre-backs / full-backs.</li>
      <li><b>Out of possession:</b> Higher line + Higher press <b>only if</b> your defenders have Pace ≥13 and Stamina is good; otherwise Standard line + Mid block. Trigger press = More Often. Use offside trap if your line is high.</li>
    </ul>

    <h3>The 5 things that actually beat the ME</h3>
    <ol>
      <li><b>Win the second balls:</b> double pivot DM+DLP gives you a man advantage in midfield. Most AI 4-2-3-1s get overrun here — you won't.</li>
      <li><b>Don't over-attack:</b> Positive mentality + one IF on Support keeps your shape. Most losses are conceded counters, not lack of chances.</li>
      <li><b>Match Pace:</b> your scoring model already prizes Pace/Acceleration for wide & forward roles — pick the high-score players the <b>Best XI</b> tab gives you. Slow IFs/full-backs get exposed.</li>
      <li><b>Set-piece routines:</b> ~30% of FM goals are set pieces. Assign your best Jumping/Heading BPD & CD to attack near post; a tall AF to far post. Put your best Corners taker on corners.</li>
      <li><b>In-match reactions:</b> losing at 60'? Push one FB and the support IF to Attack, mentality to Attacking. Winning? Drop to Cautious, both IFs to Support, waste time. React — don't set and forget.</li>
    </ol>

    <h3>Opposition instructions (quick wins)</h3>
    <ul>
      <li>Hard-tackle + close-down their playmaker (the highest-rated central player).</li>
      <li>Show their wingers <b>onto their weaker foot</b> (down the line if right-footed on the right).</li>
      <li>Against a lone striker, your spare CB steps out — your BPD is built for this.</li>
    </ul>

    <div class="tipbox"><b>Reality check:</b> if you're a small club, you will still lose some games — that's correct. The goal is to stop <i>throwing away</i> games. Use <b>Best XI</b> for selection, <b>Release list</b> to upgrade the weak links, and re-import every 6 months to watch your <b>Progression</b> climb.</div>
  </div>`;
}

/* ============================ BACKUP / RESTORE ============================ */
function backup(){
  const blob=new Blob([JSON.stringify(STATE)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="fm-team-manager-backup-"+todayStr()+".json"; a.click();
  toast("Backup downloaded");
}
document.getElementById("restoreFile").onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  f.text().then(t=>{ try{ const s=JSON.parse(t); if(s.settings){STATE=s;save();toast("Restored");go("squad");} else toast("Not a valid backup"); }catch(err){toast("Bad file");} });
};

/* ============================ BOOT ============================ */
renderTabs(); go("squad");
</script>
</body>
</html>
